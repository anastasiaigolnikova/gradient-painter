<!doctype html>
<html><head><meta charset="utf-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;700&display=swap');
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: linear-gradient(180deg, #EA489E 0%, #E9F754 50%, #000000 100%);
    font-family: 'Archivo', sans-serif;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: #fff; text-align: center; position: relative;
  }
  .grain {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.18;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
  }
  .title { font-size: 110px; font-weight: 700; letter-spacing: -2px; line-height: 0.95; margin: 0; text-shadow: 0 4px 30px rgba(0,0,0,0.3); }
  .sub { font-size: 36px; font-weight: 400; margin-top: 24px; opacity: 0.92; letter-spacing: 0.5px; max-width: 900px; }
  .tag { position: absolute; bottom: 36px; left: 0; right: 0; font-size: 22px; opacity: 0.7; letter-spacing: 0.15em; }
  .corner { position: absolute; top: 36px; left: 36px; font-size: 22px; letter-spacing: 0.15em; font-weight: 700; opacity: 0.9; }
</style></head>
<body>
  <div class="grain"></div>
  <div class="corner">HOLISTIC BRAND LAB</div>
  <h1 class="title">HOLISTIC<br>GENERATOR</h1>
  <p class="sub">Turn photos, videos and SVG into stylised<br>graphic posters and animated clips</p>
  <div class="tag">anastasiaigolnikova.github.io/gradient-painter</div>
</body></html>
