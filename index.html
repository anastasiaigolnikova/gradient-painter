  });
  // Initial state — animMode starts as 'off' so SPEED/AMP/FREQ should be greyed
  updateAnimSlidersState();
  $('#animAmp')?.addEventListener('input', (e)=>{ snapOnFirstInput('animAmp'); animAmp = parseFloat(e.target.value||'0.3')||0.3; if(filtersAnimated) ensureTickFilters(); });
  $('#animAmp')?.addEventListener('change', ()=> endSliderDrag('animAmp'));
  $('#animFreq')?.addEventListener('input', (e)=>{ snapOnFirstInput('animFreq'); animFreq = parseFloat(e.target.value||'1.2')||1.2; if(filtersAnimated) ensureTickFilters(); });
  $('#animFreq')?.addEventListener('change', ()=> endSliderDrag('animFreq'));
  
  // Video export
  let videoRecorder = null;
  let videoChunks = [];
  let isRecording = false; // Flag to track recording state
  let syntheticTime = 0; // Synthetic time for smooth video animation
  // Full-length video capture at the source video's native resolution.
  // We temporarily swap the global render canvases (photoLayer/animCanvas/offscreen)
  // for ones sized to videoWidth × videoHeight, run renderPhotomaker once per
  // decoded video frame, and capture the result through MediaRecorder.
  // Offline frame-by-frame video export via WebCodecs.
  //
  // Why this exists: MediaRecorder + canvas.captureStream produces stuttery
  // output because MediaRecorder timestamps frames by wall-clock, not by the
  // animation's logical time. Even with all sync tricks, exported MP4s feel
  // jerky on heavy filters. WebCodecs VideoEncoder lets us assign exact
  // per-frame timestamps in microseconds, and runs offline — render can take
  // 200ms/frame and the resulting file is still mathematically perfect 30fps.
  async function exportFullVideoWebCodecs(p, btn, maxDurationMs){
    // Update the label inside whichever button was used to trigger this
    // (DOWNLOAD or the hidden #exportVideo). Falls back to exportVideoLabel.
    const lbl = (btn && btn.querySelector('span')) || document.getElementById('exportVideoLabel');
    const origText = lbl ? lbl.textContent : '';
    btn.dataset.busy = '1';
    btn.disabled = true;
    // Optional cap — if set, only encode up to maxDurationMs of the video
    const capSec = (typeof maxDurationMs === 'number' && maxDurationMs > 0) ? (maxDurationMs / 1000) : null;

    const v = p.video;
    const fps = 30;
    // Higher resolution is fine here — no realtime budget to hit
    const MAX_REC_DIM = 1920;
    let vW = v.videoWidth || 1280;
    let vH = v.videoHeight || 720;
    {
      const longest = Math.max(vW, vH);
      if(longest > MAX_REC_DIM){

    vH = vH - (vH % 2);

    const origPhotoCtx   = photoCtx;
    const origAnimCanvas = animCanvas;
    const origAnimCtx    = animCtx;
    const origOffscreen  = offscreen;
    const origOffctx     = offctx;
    const wasLoop = v.loop;
    const wasMuted = v.muted;
    v.loop = false;
    v.muted = true;

    const recPhotoCtx   = recPhotoLayer.getContext('2d', { alpha: true, willReadFrequently: true });

    const recAnimCtx    = recAnimCanvas.getContext('2d', { alpha: true, willReadFrequently: true });

    recOffscreen.width  = vW; recOffscreen.height = vH;
    const recOffctx     = recOffscreen.getContext('2d', { alpha: false, willReadFrequently: true });

    const recCompCanvas = document.createElement('canvas');
    recCompCanvas.width = vW; recCompCanvas.height = vH;
    const recCompCtx    = recCompCanvas.getContext('2d', { alpha: false });

    // higher capture resolution
    const sizeScale = Math.max(
      vW / Math.max(1, origPhotoLayer.width),
      vH / Math.max(1, origPhotoLayer.height)
    );
    const origPhotoSizes = photos.map(pp => pp.size);
    if(sizeScale > 1.05 || sizeScale < 0.95){

    }

      target: new Mp4Muxer.ArrayBufferTarget(),
      // IMPORTANT: do NOT pass frameRate here. mp4-muxer uses it as the
      // track timescale (timescale = frameRate). With frameRate=30, every
      // frame's mediaTime gets rounded to the nearest 1/30s slot — and
      // VFC mediaTime values come with float jitter (~0.0333, 0.0334 etc),
      // so rounding produces an uneven stts table → playback stutters.
      // Omitting it lets the muxer pick its default high-resolution
      // timescale (57600), which has enough precision that timestamps
      // land where they actually are. This was confirmed as the root
      // cause by two independent code audits.
      video: { codec: 'avc', width: vW, height: vH },
      // Some seeks land at currentTime ~0.0001, so the first decoded
      // frame's mediaTime can be a tiny non-zero value. 'offset' tells
      // the muxer to subtract that offset instead of throwing.
      firstTimestampBehavior: 'offset',
      fastStart: 'in-memory'
    });

      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: (e) => { encoderError = e; console.error('VideoEncoder error:', e); }
    });

    // bitrate ~0.12 bits/px/frame — strong enough for high-motion animation

    // than the YouTube-default 8 Mbps to avoid mosquito-noise that reads
    // as motion stutter. Caps at 40 Mbps for 4K.

          codec, width: vW, height: vH, bitrate, framerate: fps, avc: { format: 'avc' }
        });

          break;
        }

      alert('WebCodecs H.264 не поддерживается этим браузером. Откатываюсь на старый способ записи.');

      v.loop = wasLoop; v.muted = wasMuted;
      btn.dataset.busy = '';
      btn.disabled = false;
      lbl.textContent = origText;
      updateExportButton();
      return exportFullVideo(p, btn);
    }

    try {
      _recordingActive = true;
      _skipPhotoLayerSync = true;

      // Swap globals to record-sized canvases
      photoLayer = recPhotoLayer; photoCtx = recPhotoCtx;
      animCanvas = recAnimCanvas; animCtx = recAnimCtx;
      offscreen  = recOffscreen;  offctx  = recOffctx;

      // Rewind to start
      v.pause();
      v.currentTime = 0;
      await new Promise((res)=>{
        const cb = ()=>{ v.removeEventListener('seeked', cb); res(); };
        v.addEventListener('seeked', cb);
        setTimeout(()=>{ v.removeEventListener('seeked', cb); res(); }, 1000);
      });

      // ---- Detect source video's real frame rate ----
      // Without this we'd be sampling at a fixed 30fps regardless of source.
      // For 60fps sources every other my-frame would land between real frames
      // → browser snaps to nearest keyframe → some output frames repeat,
      // others jump → motion looks like "fast then slow then fast" in the
      // exported video. By matching output fps to source fps, every i/fps
      // step lands exactly on a real source frame.
      lbl.textContent = 'PREP…';
      let detectedFps = 30;
      try {
        if(typeof v.requestVideoFrameCallback === 'function'){
          detectedFps = await new Promise((resolveFps)=>{
            const times = [];
            let measured = 0;
            const SAMPLE_COUNT = 8;
            let safety = setTimeout(()=> resolveFps(30), 2000);
            const onMeasure = (now, metadata) => {
              times.push(metadata.mediaTime);
              measured++;
              if(measured < SAMPLE_COUNT){
                v.requestVideoFrameCallback(onMeasure);
              } else {
                clearTimeout(safety);
                v.pause();
                const intervals = [];
                for(let k = 1; k < times.length; k++){
                  const d = times[k] - times[k-1];
                  if(d > 0 && d < 1) intervals.push(d);
                }
                if(intervals.length === 0){ resolveFps(30); return; }
                intervals.sort((a,b)=> a-b);

                let best = 30, bestErr = Infinity;

                }

              }
            };
            v.requestVideoFrameCallback(onMeasure);
            v.play().catch(()=> resolveFps(30));
          });

      } catch(_){}
      detectedFps = Math.max(10, Math.min(120, detectedFps || 30));

      // Re-rewind after the measurement playback
      v.pause();
      v.currentTime = 0;
      await new Promise((res)=>{
        const cb = ()=>{ v.removeEventListener('seeked', cb); res(); };
        v.addEventListener('seeked', cb);
        setTimeout(()=>{ v.removeEventListener('seeked', cb); res(); }, 1000);
      });

      // here video is PAUSED and we step it frame-by-frame via currentTime.
      // The render can take 300ms per frame (Liquid/Smoke do per-pixel work)
      // and the output is still a clean 30fps file with full duration. With
      // a VFC loop driven by v.play(), playback runs in real time — heavy
      // filters can't keep up and we miss real source frames → output ends
      // up at 5-10 effective fps → visibly choppy.
      //
      // We now use a fixed fps grid + frame-index timestamps, because the
      // muxer's timescale is no longer 30 (we dropped frameRate from the
      // muxer config — see above). Even spacing → clean playback.
      // Match output fps to detected source fps so every i/fpsOut lands
      // exactly on a real source frame (no keyframe-snap repeats, no skips).
      const fpsOut = detectedFps;
      const frameDurUs = Math.round(1_000_000 / fpsOut);
      const keyframeEvery = Math.max(30, fpsOut * 2);
      let duration = isFinite(v.duration) && v.duration > 0 ? v.duration : 10;
      if(capSec && capSec < duration) duration = capSec; // honor 10s cap
      const totalFrames = Math.max(1, Math.floor(duration * fpsOut));
      let encoded = 0;

      for(let i = 0; i < totalFrames; i++){
        if(!_recordingActive) break;
        if(encoderError) break;

        const targetTime = i / fpsOut;
        v.currentTime = targetTime;
        await new Promise((res)=>{
          const cb = ()=>{ v.removeEventListener('seeked', cb); res(); };
          v.addEventListener('seeked', cb);
          setTimeout(()=>{ v.removeEventListener('seeked', cb); res(); }, 500);
        });

        // Animation time follows the same fixed grid as the file → perfect sync
        _recordingVideoTime = targetTime;
        renderPhotomaker();
        recCompCtx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, vW, vH);
        recCompCtx.drawImage(recPhotoLayer, 0, 0);

        const frame = new VideoFrame(recCompCanvas, {
          timestamp: i * frameDurUs,
          duration: frameDurUs
        });
        try {
          encoder.encode(frame, { keyFrame: i % keyframeEvery === 0 });
        } catch(e){ encoderError = e; }
        frame.close();
        encoded++;

        // Progress
        const pct = Math.min(99, Math.floor((i / totalFrames) * 100));
        lbl.textContent = 'ENCODING ' + pct + '%';

        // Wait for encoder queue if backed up — don't skip frames
        while(encoder.encodeQueueSize > 8){
          await new Promise(r => setTimeout(r, 4));
        }
      }

      lbl.textContent = 'FINALIZING…';
      await encoder.flush();
      // Close the encoder so the muxer sees the true number of frames and
      // doesn't extend the duration past the last real frame.
      try { encoder.close(); } catch(_){}

      const blob = new Blob([buffer], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'gradient-painter-' + vW + 'x' + vH + '-' + Date.now() + '.mp4';
      a.rel = 'noopener';
      a.style.display = 'none';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=> URL.revokeObjectURL(url), 2000);
    } catch(err){
      console.error('WebCodecs export error:', err);
      alert('Ошибка записи: ' + (err && err.message ? err.message : err));
    } finally {
      // Always close the encoder — on the error path we skipped the explicit
      // close above, which would otherwise leak its GPU resources and pin
      // the muxer's growing ArrayBufferTarget alive. State guard avoids
      // re-closing if the success path already closed it.
      try { if(encoder && encoder.state !== 'closed') encoder.close(); } catch(_){}

      _recordingVideoTime = null;
      photos.forEach((pp, i) => { if(typeof origPhotoSizes[i] === 'number') pp.size = origPhotoSizes[i]; });

      photoLayer = origPhotoLayer; photoCtx = origPhotoCtx;
      animCanvas = origAnimCanvas; animCtx = origAnimCtx;
      offscreen  = origOffscreen;  offctx  = origOffctx;
      _skipPhotoLayerSync = false;
      v.loop = wasLoop;
      v.muted = wasMuted;
      try { v.currentTime = 0; await v.play(); } catch(_){}
      btn.dataset.busy = '';
      btn.disabled = false;
      lbl.textContent = origText;
      updateExportButton();
      ensureVideoLoop();
      renderPhotomaker();
    }
  }

  async function exportFullVideo(p, btn, maxDurationMs){
    const lbl = (btn && btn.querySelector('span')) || document.getElementById('exportVideoLabel');
    const origText = lbl ? lbl.textContent : '';
    btn.dataset.busy = '1';
    btn.disabled = true;

    // MediaRecorder duplicates frames and the file looks like it's stuttering.
    // 720p halves the pixel work and brings render under the 30fps budget for
    // most filters, giving smooth playback even on heavy effects.

    let vH = v.videoHeight || 720;
    {
      const longest = Math.max(vW, vH);
      if(longest > MAX_REC_DIM){
        const k = MAX_REC_DIM / longest;
        vW = Math.round(vW * k);
        vH = Math.round(vH * k);
      }
    }

    const origPhotoCtx   = photoCtx;
    const origAnimCanvas = animCanvas;
    const origAnimCtx    = animCtx;
    const origOffscreen  = offscreen;
    const origOffctx     = offctx;
    const wasLoop = v.loop;
    v.loop = false;

    const recPhotoCtx   = recPhotoLayer.getContext('2d', { alpha: true, willReadFrequently: true });
    const recAnimCanvas = document.createElement('canvas');
    recAnimCanvas.width = vW; recAnimCanvas.height = vH;
    const recAnimCtx    = recAnimCanvas.getContext('2d', { alpha: true, willReadFrequently: true });

    let mimeType, fileExt;

      btn.dataset.busy = '';
      btn.disabled = false;
      lbl.textContent = origText;
      updateExportButton();
      // Kick the regular video loop back into life so the display canvas updates
      ensureVideoLoop();
      renderPhotomaker();
    }
  }

  // Shared video-export entry point. Routes to:
  //  - exportFullVideoWebCodecs / exportFullVideo when a video is loaded
  //  - N-second synthetic-time MediaRecorder loop for animated photos
  // The triggering button (#exportVideo or #download) gets its busy flag,
  // disabled state, and label updated by passing in (btn, lbl).
  // durationMs is the requested loop length (5000 or 10000) — only used for
  // the photo+animation path; video export uses the source video's length.
  async function runVideoExport(btn, lbl, durationMs){
    if(!btn) return;
    if(btn.dataset.busy === '1') return;
    // Mode A: download the source video fully (or capped at durationMs) through filter + animation.
    const videoPhoto = photos.find(p => p.isVideo);
    if(videoPhoto){
      const hasWebCodecs = typeof VideoEncoder !== 'undefined' && typeof VideoFrame !== 'undefined';
      const hasMuxer = typeof window.Mp4Muxer !== 'undefined' && window.Mp4Muxer.Muxer;
      if(hasWebCodecs && hasMuxer){
        return exportFullVideoWebCodecs(videoPhoto, btn, durationMs);
      }
      return exportFullVideo(videoPhoto, btn, durationMs);
    }
    // Mode B: N-second synthetic-time animation recording for a photo / SVG art
    if(!filtersAnimated || (photos.length === 0 && !svgLoaded)){
      alert('Включите анимацию и загрузите фото / SVG');
      return;
    }

    const origText = lbl ? lbl.textContent : '';
    btn.dataset.busy = '1';
    btn.disabled = true;

    try {
      // Create a temporary canvas to capture the composite (WebGL + photo layer)
      const captureCanvas = document.createElement('canvas');
      const pw = photoLayer.width, ph = photoLayer.height;
      // Use display resolution (higher quality)
      captureCanvas.width = pw;
      captureCanvas.height = ph;
      const captureCtx = captureCanvas.getContext('2d', {
        alpha: true,
        desynchronized: false
      });
      
      // Explicit codec preference. Plain 'video/mp4' lets Chrome pick a
      // subprofile that often produces a broken / unplayable file. Asking for
      // a concrete H.264 profile string fixes that.
      let mimeType = '', fileExt = 'webm';
      if(MediaRecorder.isTypeSupported('video/mp4;codecs=avc1.640028')){ mimeType = 'video/mp4;codecs=avc1.640028'; fileExt = 'mp4'; }
      else if(MediaRecorder.isTypeSupported('video/mp4;codecs=avc1.42E01E')){ mimeType = 'video/mp4;codecs=avc1.42E01E'; fileExt = 'mp4'; }
      else if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9')){ mimeType = 'video/webm;codecs=vp9'; fileExt = 'webm'; }
      else if(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')){ mimeType = 'video/webm;codecs=vp8'; fileExt = 'webm'; }
      else if(MediaRecorder.isTypeSupported('video/webm')){ mimeType = 'video/webm'; fileExt = 'webm'; }
      
      // MediaRecorder setup with high quality.
      // captureStream(0) means "only capture when requestFrame() is called",
      // giving us deterministic per-frame control instead of relying on the
      // browser polling the canvas at its own rate (which gets throttled when
      // the tab is backgrounded — that's what makes the export come out as
      // 1 static frame). We call requestFrame() once per renderLoop tick.
      const stream = captureCanvas.captureStream(0);
      const captureTrack = stream.getVideoTracks()[0];
      const canRequestFrame = captureTrack && typeof captureTrack.requestFrame === 'function';
      videoRecorder = new MediaRecorder(stream, {
        mimeType: mimeType,
        videoBitsPerSecond: 30000000 // 30 Mbps для максимального качества
      });
      
      videoChunks = [];
      videoRecorder.ondataavailable = (e)=> { if(e.data && e.data.size>0) videoChunks.push(e.data); };
      videoRecorder.onstop = ()=>{
        // Force download instead of inline open: octet-stream tells Chrome
        // "binary file, save it" — playable correctness comes from the .mp4
        // extension which the OS uses to pick a player on double-click.
        const blob = new Blob(videoChunks, {type: 'application/octet-stream'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `animation-${Date.now()}.${fileExt}`;
        a.rel = 'noopener';
        a.style.display = 'none';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=> URL.revokeObjectURL(url), 2000);
        if(lbl) lbl.textContent = origText;
        btn.dataset.busy = '';
        btn.disabled = false;
        updateExportButton();
      };
      
      // Start recording with data chunks every 100ms for stability
      videoRecorder.start(100);
      
      // Enable recording mode with synthetic time for smooth animation
      isRecording = true;
      syntheticTime = 0;
      
      // Render loop for exactly N seconds with FIXED time step (default 5s)
      const startTime = performance.now();
      const targetDuration = Math.max(1000, durationMs || 5000);
      const fps = 30;
      const frameTimeStep = 1 / fps; // Fixed time increment per frame (in seconds)
      let frameCount = 0;
      
      const renderLoop = ()=>{
        // Synthetic frame index drives the clock — wall-clock is only used
        // for the progress label. This way the loop pacing (setTimeout 33ms)
        // doesn't affect the resulting video duration; we always render
        // exactly fps × seconds = 150 frames.
        const totalFrames = Math.round((targetDuration/1000) * fps); // 150
        if(frameCount >= totalFrames){
          isRecording = false;
          setTimeout(()=>{
            try { videoRecorder.stop(); } catch(_){}
            if(lbl) lbl.textContent = origText;
            const elapsedReal = performance.now() - startTime;
            console.log(`Recording complete: ${elapsedReal.toFixed(0)}ms wall, ${frameCount} frames captured, using ${mimeType}`);
            if(frameCount < 10){
              alert('Запись не удалась: получилось всего ' + frameCount + ' кадров. Попробуйте ещё раз и не сворачивайте окно браузера во время записи.');
            }
          }, 500);
          return;
        }

        // Update progress label off the actual frame count, not wall clock
        const progress = Math.floor((frameCount / totalFrames) * 100);
        if(lbl) lbl.textContent = `RECORDING ${progress}%`;

        // Advance the animation clock by exactly one frame's worth of seconds.
        // No animSpeed multiplier here — renderPhotomaker already applies it
        // inside (t = tSec * animSpeed). Double-applying would square SPEED.
        syntheticTime += frameTimeStep;

        // Render current animation frame using synthetic time
        renderPhotomaker();

        // Copy composite (gradient + photo/filter overlay) to capture canvas
        captureCtx.imageSmoothingEnabled = true;
        captureCtx.imageSmoothingQuality = 'high';
        captureCtx.clearRect(0,0,pw,ph);
        captureCtx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, pw, ph);
        captureCtx.drawImage(photoLayer, 0, 0);

        // Push this frame into the MediaRecorder stream. With captureStream(0)
        // the browser only samples the canvas when we explicitly ask — this
        // is what guarantees each render becomes a frame in the output MP4,
        // regardless of tab focus / RAF throttling.
        if(canRequestFrame){
          try { captureTrack.requestFrame(); } catch(_){}
        }

        frameCount++;

        // setTimeout (not RAF) so the loop keeps running at full speed even
        // if the tab is backgrounded during recording. RAF throttles to ~1Hz
        // on hidden tabs, which previously produced 1-frame static "videos".
        setTimeout(renderLoop, Math.round(1000/fps));
      };

      renderLoop();
      
    } catch(err){
      console.error('Video export error:', err);
      alert('Ошибка записи видео: ' + err.message);
      if(lbl) lbl.textContent = origText;
      btn.dataset.busy = '';
      btn.disabled = false;
      updateExportButton();
    }
  }

  $('#exportVideo')?.addEventListener('click', ()=>{
    runVideoExport($('#exportVideo'), document.getElementById('exportVideoLabel'), 5000);
  });

  // 10-second download variant — works for both photo+animation (5/10s loop)
  // and video (10s clip — see maxDurationMs in export functions).
  $('#download10')?.addEventListener('click', ()=>{
    const btn = $('#download10');
    if(btn.dataset.busy === '1') return;
    runVideoExport(btn, document.getElementById('download10Label'), 10000);
  });

  // ===== Manual live recording =====
  // Captures the live composite (WebGL gradient + photo/filter/animation layer)
  // while the user manipulates sliders / dropdowns. Click to start, click to
  // stop — the file downloads on stop. Useful for "show me what changing this
  // filter does" social-media clips. No fixed duration, no synthetic time —
  // wall-clock real-time, exactly what's on screen.
  let _manualRec = null;
  let _manualRecRAF = null;
  let _manualRecTimer = null;
  let _manualRecComp = null;
  let _manualRecStart = 0;

  function manualRecStart(){
    if(_manualRec) return;
    const pw = photoLayer.width, ph = photoLayer.height;
    if(!pw || !ph || (photos.length === 0 && !svgLoaded)){
      alert('Сначала загрузите фото / видео / SVG');
      return;
    }

    // Composite canvas — refreshed every RAF tick with current gl + photoLayer
    const comp = document.createElement('canvas');
    comp.width = pw; comp.height = ph;
    const cctx = comp.getContext('2d', { alpha: false });
    comp.style.cssText = 'position:fixed;left:-99999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none';
    document.body.appendChild(comp);
    _manualRecComp = comp;

    let mimeType = '', fileExt = 'webm';
    if(MediaRecorder.isTypeSupported('video/mp4;codecs=avc1.640028')){ mimeType = 'video/mp4;codecs=avc1.640028'; fileExt = 'mp4'; }
    else if(MediaRecorder.isTypeSupported('video/mp4;codecs=avc1.42E01E')){ mimeType = 'video/mp4;codecs=avc1.42E01E'; fileExt = 'mp4'; }
    else if(MediaRecorder.isTypeSupported('video/mp4')){ mimeType = 'video/mp4'; fileExt = 'mp4'; }
    else if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9')){ mimeType = 'video/webm;codecs=vp9'; fileExt = 'webm'; }
    else if(MediaRecorder.isTypeSupported('video/webm')){ mimeType = 'video/webm'; fileExt = 'webm'; }

    const bitrate = Math.max(8_000_000, Math.min(20_000_000, Math.round(pw * ph * 30 * 0.12)));
    const stream = comp.captureStream(30);
    const recorder = new MediaRecorder(stream, mimeType ? { mimeType, videoBitsPerSecond: bitrate } : { videoBitsPerSecond: bitrate });
    const chunks = [];
    recorder.ondataavailable = (e)=>{ if(e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = ()=>{
      const blob = new Blob(chunks, { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gradient-painter-live-${Date.now()}.${fileExt}`;
      a.rel = 'noopener'; a.style.display = 'none';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 2000);
      if(_manualRecComp?.parentNode) _manualRecComp.parentNode.removeChild(_manualRecComp);
      _manualRecComp = null;
      _manualRec = null;
    };

    function tick(){
      if(!_manualRec) return;
      // Composite: black base, scaled WebGL gradient, photoLayer (filter + anim) on top
      cctx.fillStyle = '#000';
      cctx.fillRect(0, 0, comp.width, comp.height);
      cctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, comp.width, comp.height);
      if(photoLayer && photoLayer.width){
        cctx.drawImage(photoLayer, 0, 0, photoLayer.width, photoLayer.height, 0, 0, comp.width, comp.height);
      }
      _manualRecRAF = requestAnimationFrame(tick);
    }

    recorder.start(100);
    _manualRec = recorder;
    _manualRecStart = performance.now();
    tick();

    // UI: turn the button into a stop button with running timer.
    // Auto-stop at 15s to avoid runaway recordings and unbounded memory growth.
    const MANUAL_REC_MAX_MS = 15000;
    const lbl = document.getElementById('manualRecLabel');
    if(lbl) lbl.textContent = '■ STOP (0.0 / 15s)';
    _manualRecTimer = setInterval(()=>{
      const elapsed = performance.now() - _manualRecStart;
      const sec = (elapsed / 1000).toFixed(1);
      if(lbl) lbl.textContent = '■ STOP (' + sec + ' / 15s)';
      if(elapsed >= MANUAL_REC_MAX_MS) manualRecStop();
    }, 100);
  }

  function manualRecStop(){
    if(!_manualRec) return;
    if(_manualRecTimer){ clearInterval(_manualRecTimer); _manualRecTimer = null; }
    if(_manualRecRAF != null){ cancelAnimationFrame(_manualRecRAF); _manualRecRAF = null; }
    try { _manualRec.stop(); } catch(_) {}
    const lbl = document.getElementById('manualRecLabel');
    if(lbl) lbl.textContent = '● RECORD LIVE';
  }

  $('#manualRec')?.addEventListener('click', ()=>{
    if(_manualRec) manualRecStop();
    else manualRecStart();
  });

  // removed photoScale slider listener (scaling now on-canvas)

  // (удалены глобальные обработчики stage/mousemove для предотвращения дребезга)

  // APPLY button: bake current photo into the offscreen texture and disable selection
  document.getElementById('applyPhoto')?.addEventListener('click', ()=>{
    if(photos.length===0) return;
    showPhotoSelection = false; isDraggingPhoto=false; isResizingPhoto=false;
    // Скрыть UI
    document.getElementById('photoUi').style.display='none';
    // Сбросить флаги рисования, чтобы кисть не залипала
    drawing = false;
    renderPhotomaker();
  });
  // ========== END PHOTOMAKER ==========

  const overlayEl = document.getElementById('designOverlay');
  let overlayOn = false;
  function setOverlay(on){
    overlayOn = on;
    overlayEl.style.display = on ? 'block' : 'none';
  }
  document.addEventListener('keydown', (e)=>{
    if((e.key||'').toLowerCase()==='o'){
      if(!overlayOn){
        fetch('test.svg').then(res=>{
          if(res.ok){ return res.text(); }
          throw new Error('no svg');
        }).then(svg=>{
          const blob = new Blob([svg], {type:'image/svg+xml'});
          overlayEl.style.backgroundImage = `url(${URL.createObjectURL(blob)})`;
          setOverlay(true);
        }).catch(()=>{
          fetch('test.png').then(r=>{
            if(r.ok){
              overlayEl.style.backgroundImage = 'url(test.png)';
              setOverlay(true);
            } else {
              alert('Нет test.svg или test.png в папке проекта');
            }
          });
        });
      } else {
        setOverlay(false);
      }
    }
  });

})();
</script>
</body>
