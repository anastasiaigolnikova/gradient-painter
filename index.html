        const tileCx = sx + tw*0.5, tileCy = sy + th*0.5;
        const dxBase = (tileCx - cx) / Math.max(1, w*0.5);
        const dyBase = (tileCy - cy) / Math.max(1, h*0.5);
        const ang = Math.atan2(dyBase, dxBase) + (rand1 - 0.5) * 1.2;
        const dist = (0.4 + rand2) * tri * animAmp * 250;
        const ox = Math.cos(ang) * dist;
        const oy = Math.sin(ang) * dist;
        const rot = (rand1 - 0.5) * tri * Math.PI * 0.6;
        const alpha = 1 - tri * 0.7;
        destCtx.save();
        destCtx.globalAlpha = Math.max(0, alpha);
        destCtx.translate(sx + tw*0.5 + ox, sy + th*0.5 + oy);
        destCtx.rotate(rot);
        destCtx.drawImage(sourceCanvas, sx, sy, tw, th, -tw*0.5, -th*0.5, tw, th);
        destCtx.restore();
      }
    }
    destCtx.globalAlpha = 1;
  }

  // Pixel HD: image revealed through a grid of square cells that flicker in/out, with thin frames
  function effectPixelHD(destCtx, sourceCanvas, w, h, t, tSec){
    // Active cells show filter content over the gradient. Inactive cells get
    // a solid BLACK fill — the visual signature of the effect. Without that
    // fill the effect just looks like a sparse mosaic with gradient bleeding
    // through, which is what regressed when this was changed to transparent.
    destCtx.clearRect(0, 0, w, h);
    // Block size driven by SIZE slider; FREQUENCY now only modulates flicker rate
    const sel = getSelectedPhoto();
    const sizeSlider = sel ? (sel.size ?? 20) : 20;
    const blockSize = Math.max(8, Math.floor(sizeSlider * 1.5));
    const cols = Math.ceil(w / blockSize);
    const rows = Math.ceil(h / blockSize);
    // 2× base rate so cells visibly flicker at SPEED=1
    const cycle = 2.5 / Math.max(0.2, animSpeed);
    const phase = (tSec % cycle) / cycle;
    destCtx.lineWidth = 1;
    // Replace per-cell random phase (which read as random noise, not motion)
    // with a diagonal sweep: (c + r) drives the activation wave so cells
    // light up along a diagonal travelling across the grid — feels like a
    // loading scan / data sweep. Per-cell randomness becomes a small offset.
    // Soft fade in/out (easeInOutCubic on the local window) replaces the
    // harsh on/off snap with a graceful materialise/dissolve.
    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        const id = r * cols + c;
        const sweep = (c + r) * 0.04 + seededRandom(id * 0.137) * 0.15;
        const local = (phase + sweep) % 1;
        // Activation window [0.25, 0.85]; alpha eased in/out across it
        let alpha = 0;
        if(local > 0.20 && local < 0.90){
          const lp = (local - 0.20) / 0.70; // 0..1 within window
          // Ease in/out + plateau: fade in to ~1 from edges, hold at middle
          const a = lp < 0.25 ? easeInOutCubic(lp / 0.25)
                  : lp > 0.75 ? easeInOutCubic((1 - lp) / 0.25)
                              : 1;
          alpha = a;
        }
        const active = alpha > 0.05;
        const x = c * blockSize, y = r * blockSize;
        const bw = Math.min(blockSize, w - x), bh = Math.min(blockSize, h - y);
        if(active){
          destCtx.fillStyle = '#000';
          destCtx.fillRect(x, y, bw, bh);
          destCtx.globalAlpha = alpha;
          destCtx.drawImage(sourceCanvas, x, y, bw, bh, x, y, bw, bh);
          destCtx.globalAlpha = 1;
        } else {
          destCtx.fillStyle = '#000';
          destCtx.fillRect(x, y, bw, bh);
        }
        if(seededRandom(id * 0.31) > 0.45){
          destCtx.strokeStyle = active ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.16)';
          destCtx.strokeRect(x + 0.5, y + 0.5, bw - 1, bh - 1);
        }
      }
    }
  }

  // AI Scan: object rendered as scanned dot-pattern, with data nodes (glowing dots + IDs) connected by thin lines
  // AI Scan persistent state for cross-frame tracking + motion differencing.
  // Reset to null on canvas resize so we don't compare stale frames.
  const _aiScan = {
    tracks: [],         // [{id, label, x, y, vx, vy, age, lost, conf, trail:[{x,y}]}]
    prev: null,         // Uint8ClampedArray copy of previous animCanvas pixel buffer
    prevW: 0, prevH: 0,
    nextId: 431,
    frame: 0
  };

  // AI Scan: raw machine-vision debug overlay drawn ON TOP of the live video/filter.
  // Tracking is purely motion-driven — candidates come from frame-differencing blocks,
  // not brightness. Static frames produce no tracks (correct CV behaviour).
  function effectAIScan(destCtx, sourceCanvas, w, h, t, tSec){
    // Motion detection source: prefer the RAW pre-filter frame from offscreen
    // when a filter is active. Filters like Signs render black-on-transparent,
    // so animCanvas has almost no luminance variation between frames and
    // motion threshold never trips. The raw video frame in offscreen always
    // has rich luminance changes between frames.
    const sel = getSelectedPhoto();
    const pat = sel ? (sel.pattern || 'none') : 'none';
    let imgData;
    try {
      imgData = (pat !== 'none' && offctx) ? offctx.getImageData(0, 0, w, h)
                                            : animCtx.getImageData(0, 0, w, h);
    } catch(_){
      imgData = animCtx.getImageData(0, 0, w, h);
    }
    const src = imgData.data;

    // --- Base layer: the live source (video or filtered image), shown as-is.
    destCtx.drawImage(sourceCanvas, 0, 0);

    // --- Subtle monochrome reference grid (CV viewport vibe)
    destCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    destCtx.lineWidth = 1;
    const gs = 40;
    for(let gx = gs; gx < w; gx += gs){
      destCtx.beginPath(); destCtx.moveTo(gx + 0.5, 0); destCtx.lineTo(gx + 0.5, h); destCtx.stroke();
    }
    for(let gy = gs; gy < h; gy += gs){
      destCtx.beginPath(); destCtx.moveTo(0, gy + 0.5); destCtx.lineTo(w, gy + 0.5); destCtx.stroke();
    }

    // --- Motion detection: block-wise luminance diff vs previous frame.
    // Threshold balanced so subtle real motion (slow head/hand) still registers
    // while bokeh shimmer / grain is filtered out by the cluster-size step below.
    const blockSize = 32;
    const motionThreshold = 10 + (1 - animAmp) * 10; // ~10..20; lower AMP = stricter
    const cols = Math.ceil(w / blockSize);
    const rows = Math.ceil(h / blockSize);
    const motionGrid = new Float32Array(cols * rows); // 0 = no motion, else intensity
    if(_aiScan.prev && _aiScan.prevW === w && _aiScan.prevH === h){
      const prev = _aiScan.prev;
      for(let by = 0; by + blockSize <= h; by += blockSize){
        for(let bx = 0; bx + blockSize <= w; bx += blockSize){
          let sumDiff = 0, samples = 0;
          for(let yy = by; yy < by + blockSize; yy += 4){
            for(let xx = bx; xx < bx + blockSize; xx += 4){
              const i = (yy * w + xx) * 4;
              const a = src[i] * 0.299 + src[i+1] * 0.587 + src[i+2] * 0.114;
              const b = prev[i] * 0.299 + prev[i+1] * 0.587 + prev[i+2] * 0.114;
              sumDiff += Math.abs(a - b);
              samples++;
            }
          }
          const avg = sumDiff / Math.max(1, samples);
          if(avg > motionThreshold){
            const cx = Math.floor(bx / blockSize);
            const cy = Math.floor(by / blockSize);
            motionGrid[cy * cols + cx] = avg;
          }
        }
      }
    }
    if(!_aiScan.prev || _aiScan.prevW !== w || _aiScan.prevH !== h){
      _aiScan.prev = new Uint8ClampedArray(src);
      _aiScan.prevW = w; _aiScan.prevH = h;
    } else {
      _aiScan.prev.set(src);
    }

    // --- Cluster motion blocks into connected components (4-neighbour BFS).
    // This separates real moving objects (dense blobs of motion blocks) from
    // scattered noise (single isolated blocks from bokeh/grain). Only clusters
    // with at least minCells cells are kept and drawn as ONE bounding box.
    const visited = new Uint8Array(cols * rows);
    const minCells = 2; // discard only isolated single-block noise; keep small real motion (slow hands/faces)
    const clusters = [];
    for(let idx = 0; idx < motionGrid.length; idx++){
      if(!motionGrid[idx] || visited[idx]) continue;
      visited[idx] = 1;
      const stack = [idx];
      let minCx = Infinity, minCy = Infinity, maxCx = -Infinity, maxCy = -Infinity;
      let sumI = 0, cellCount = 0;
      while(stack.length){
        const i = stack.pop();
        const cy = (i / cols) | 0;
        const cx = i - cy * cols;
        if(cx < minCx) minCx = cx;
        if(cy < minCy) minCy = cy;
        if(cx > maxCx) maxCx = cx;
        if(cy > maxCy) maxCy = cy;
        sumI += motionGrid[i];
        cellCount++;
        // 4-neighbours
        if(cx + 1 < cols){ const n = i + 1; if(motionGrid[n] && !visited[n]){ visited[n] = 1; stack.push(n); } }
        if(cx > 0){ const n = i - 1; if(motionGrid[n] && !visited[n]){ visited[n] = 1; stack.push(n); } }
        if(cy + 1 < rows){ const n = i + cols; if(motionGrid[n] && !visited[n]){ visited[n] = 1; stack.push(n); } }
        if(cy > 0){ const n = i - cols; if(motionGrid[n] && !visited[n]){ visited[n] = 1; stack.push(n); } }
      }
      if(cellCount < minCells) continue;
      clusters.push({
        x: minCx * blockSize,
        y: minCy * blockSize,
        w: (maxCx - minCx + 1) * blockSize,
        h: (maxCy - minCy + 1) * blockSize,
        cx: ((minCx + maxCx + 1) * 0.5) * blockSize,
        cy: ((minCy + maxCy + 1) * 0.5) * blockSize,
        intensity: sumI / cellCount,
        cellCount
      });
    }
    // Sort biggest/strongest clusters first
    clusters.sort((a, b) => (b.cellCount * b.intensity) - (a.cellCount * a.intensity));
    // "motion" for downstream code is now the cluster list, not individual blocks
    const motion = clusters;

    // --- Candidate detections: cluster centers (one per real moving region).
    // For large clusters we also seed extra sample points inside the cluster
    // bounding box so big objects (a whole body) get multiple markers, not one.
    const targetTracks = Math.max(4, Math.min(12, Math.floor(5 + animAmp * 8)));
    const candidates = [];
    for(const c of clusters){
      candidates.push({ x: c.cx, y: c.cy, score: c.intensity * c.cellCount });
      // Sub-seed inside large clusters: corners of the bbox if it's big enough
      if(c.cellCount >= 6){
        candidates.push({ x: c.x + c.w * 0.25, y: c.y + c.h * 0.4, score: c.intensity * c.cellCount * 0.7 });
        candidates.push({ x: c.x + c.w * 0.75, y: c.y + c.h * 0.4, score: c.intensity * c.cellCount * 0.7 });
        candidates.push({ x: c.x + c.w * 0.5,  y: c.y + c.h * 0.8, score: c.intensity * c.cellCount * 0.7 });
      }
    }
    candidates.sort((a, b) => b.score - a.score);
    const minDist = Math.min(w, h) * 0.14;
    const detected = [];
    for(const c of candidates){
      if(detected.length >= targetTracks) break;
      let close = false;
      for(const d of detected){
        const dx = d.x - c.x, dy = d.y - c.y;
        if(dx*dx + dy*dy < minDist * minDist){ close = true; break; }
      }
      if(!close) detected.push(c);
    }

    // --- Track matching: nearest-neighbor association, smooth follow, coast when lost
    const matchRadius = Math.min(w, h) * 0.2;
    const usedDet = new Set();
    for(const tr of _aiScan.tracks){
      let bestIdx = -1, bestD2 = matchRadius * matchRadius;
      for(let i = 0; i < detected.length; i++){
        if(usedDet.has(i)) continue;
        const dx = detected[i].x - tr.x;
        const dy = detected[i].y - tr.y;
        const d2 = dx * dx + dy * dy;
        if(d2 < bestD2){ bestD2 = d2; bestIdx = i; }
      }
      if(bestIdx >= 0){
        usedDet.add(bestIdx);
        const target = detected[bestIdx];
        const k = 0.35;
        const newX = tr.x + (target.x - tr.x) * k;
        const newY = tr.y + (target.y - tr.y) * k;
        tr.vx = newX - tr.x;
        tr.vy = newY - tr.y;
        tr.trail.push({ x: tr.x, y: tr.y });
        if(tr.trail.length > 22) tr.trail.shift();
        tr.x = newX; tr.y = newY;
        tr.age++; tr.lost = 0;
        tr.conf = Math.min(1, tr.conf + 0.08);
      } else {
        tr.lost++;
        tr.x += (tr.vx || 0) * 0.6;
        tr.y += (tr.vy || 0) * 0.6;
        tr.conf = Math.max(0, tr.conf - 0.12);
      }
    }
    _aiScan.tracks = _aiScan.tracks.filter(tr => tr.lost < 12 && tr.conf > 0.05);
    // Spawn new tracks for unmatched detections
    for(let i = 0; i < detected.length; i++){
      if(usedDet.has(i)) continue;
      if(_aiScan.tracks.length >= targetTracks) break;
      _aiScan.tracks.push({
        id: _aiScan.nextId++,
        label: 574000 + Math.floor(Math.random() * 999),
        x: detected[i].x, y: detected[i].y, vx: 0, vy: 0,
        age: 0, lost: 0, conf: 0.45, trail: []
      });
    }

    // --- Motion bounding boxes (thin white, red flash on high-intensity blocks)
    destCtx.lineWidth = 1;
    destCtx.font = '8px ui-monospace, "SF Mono", Menlo, monospace';
    destCtx.textBaseline = 'alphabetic';
    for(const m of motion){
      destCtx.strokeStyle = m.intensity > 35 ? 'rgba(255, 255, 255, 0.32)' : 'rgba(255, 255, 255, 0.16)';
      destCtx.strokeRect(m.x + 0.5, m.y + 0.5, m.w - 1, m.h - 1);
      // Occasional red anomaly marker on big motion
      if(m.intensity > 50 && (_aiScan.frame + m.x + m.y) % 7 === 0){
        destCtx.strokeStyle = 'rgba(255, 60, 60, 0.85)';
        destCtx.strokeRect(m.x - 1, m.y - 1, m.w + 2, m.h + 2);
      }
      if(m.intensity > 20){
        destCtx.fillStyle = 'rgba(255, 255, 255, 0.55)';
        destCtx.fillText('mot=' + Math.floor(m.intensity), m.x + 2, m.y + 9);
      }
    }

    // --- Faint constellation lines between nearby tracks
    const connDist = Math.min(w, h) * 0.55;
    for(let i = 0; i < _aiScan.tracks.length; i++){
      for(let j = i + 1; j < _aiScan.tracks.length; j++){
        const dx = _aiScan.tracks[j].x - _aiScan.tracks[i].x;
        const dy = _aiScan.tracks[j].y - _aiScan.tracks[i].y;
        const d2 = dx * dx + dy * dy;
        if(d2 < connDist * connDist){
          const fade = 1 - Math.sqrt(d2) / connDist;
          destCtx.strokeStyle = 'rgba(255, 255, 255, ' + (0.06 + fade * 0.22) + ')';
          destCtx.beginPath();
          destCtx.moveTo(_aiScan.tracks[i].x, _aiScan.tracks[i].y);
          destCtx.lineTo(_aiScan.tracks[j].x, _aiScan.tracks[j].y);
          destCtx.stroke();
        }
      }
    }

    // --- Draw tracks: jitter, polyline trail, square marker, loose dashed bbox,
    //     pseudo-code labels following the point
    destCtx.font = '9px ui-monospace, "SF Mono", Menlo, monospace';
    for(const tr of _aiScan.tracks){
      const jx = (Math.random() - 0.5) * 1.4;
      const jy = (Math.random() - 0.5) * 1.4;
      const px = tr.x + jx;
      const py = tr.y + jy;

      // Trail as polyline of past positions
      if(tr.trail.length >= 2){
        destCtx.strokeStyle = 'rgba(255, 255, 255, 0.28)';
        destCtx.lineWidth = 1;
        destCtx.beginPath();
        destCtx.moveTo(tr.trail[0].x, tr.trail[0].y);
        for(let i = 1; i < tr.trail.length; i++){
          destCtx.lineTo(tr.trail[i].x, tr.trail[i].y);
        }
        destCtx.lineTo(px, py);
        destCtx.stroke();
      }

      // Square tracking marker — bigger and brighter
      const mk = 14;
      destCtx.lineWidth = 1.4;
      destCtx.strokeStyle = 'rgba(255, 255, 255, ' + (0.75 + tr.conf * 0.25) + ')';
      destCtx.strokeRect(px - mk * 0.5, py - mk * 0.5, mk, mk);
      destCtx.lineWidth = 1;

      // Hard inner pixel
      destCtx.fillStyle = 'rgba(255, 255, 255, 1)';
      destCtx.fillRect(Math.floor(px) - 1, Math.floor(py) - 1, 3, 3);

      // Dashed loose bounding box (slow pulse) — more visible (speed-scaled)
      const bb = 26 + Math.floor(Math.sin(t * 1.4 + tr.id) * 6);
      destCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      destCtx.setLineDash([3, 4]);
      destCtx.strokeRect(px - bb, py - bb, bb * 2, bb * 2);
      destCtx.setLineDash([]);

      // Labels following the point (jittering coords, conf, age, pseudo-code)
      const labX = Math.floor(px + 12);
      const labY = Math.floor(py - 12);
      destCtx.fillStyle = 'rgba(255, 255, 255, 1)';
      destCtx.fillText(String(tr.label), labX, labY);
      destCtx.fillStyle = 'rgba(255, 255, 255, 0.75)';
      destCtx.fillText('x:' + Math.floor(px) + ' y:' + Math.floor(py), labX, labY + 11);
      destCtx.fillStyle = 'rgba(255, 255, 255, 0.65)';
      destCtx.fillText('conf=' + (tr.conf * 100).toFixed(0) + ' age=' + tr.age, labX, labY + 22);
      // Pseudo-code fragment that rotates per frame for an "exposed-internals" feel
      if((tr.id + _aiScan.frame) % 5 === 0){
        const codes = ['track.predict()', 'KF.update(z)', 'iou=0.74', 'cls=hand', 'desc.match()'];
        destCtx.fillStyle = 'rgba(255, 255, 255, 0.32)';
        destCtx.fillText(codes[(tr.id + _aiScan.frame) % codes.length], labX, labY + 30);
      }
    }

    _aiScan.frame++;
  }

  // Global storage for dots metadata (built once per render)
  // Per-element metadata for animation overlays. Each render*() filter
  // populates its array as it draws; applyShuffleAnimation reads them.
  let dotsMetadata = [];
  let dispersionMetadata = [];
  let shapesMetadata = [];
  let gradientMetadata = [];
  let weaveMetadata = [];
  // Global storage for Displace (3D) particles metadata
  let displaceMetadata = [];
  // Global storage for ASCII (Signs) glyph metadata — used to animate individual characters
  let asciiMetadata = [];
  let asciiFontSize = 12;

  // ASCII (Signs) animation: redraws every glyph each frame with per-mode offset / replacement / fade
  // Shuffle: universal "swap places" animation for any filter that has
  // per-element metadata (dots, ascii glyphs, displace particles). Each
  // element migrates along a smooth sin-wave between its own anchor and a
  // stable random partner element's anchor — and back. Elements keep their
  // original shape (no scaling, no deformation), only position changes.
  // The figure stays readable because every element moves to ANOTHER element's
  // position inside the same figure → silhouette is preserved.
  function applyShuffleAnimation(destCtx, sourceCanvas, w, h, t, tSec){
    const sel = getSelectedPhoto();
    const pattern = sel ? (sel.pattern || 'none') : 'none';

    // Choose which metadata array to drive the shuffle from. All graphic
    // filters that store per-element data are supported: dots, displace,
    // ascii (Signs), dispersion, shapes (Abstract), gradient.
    let meta = null;
    let mode = '';
    if(pattern === 'ascii' && asciiMetadata && asciiMetadata.length > 0){
      meta = asciiMetadata; mode = 'ascii';
    } else if(pattern === 'dots' && dotsMetadata && dotsMetadata.length > 0){
      meta = dotsMetadata; mode = 'dots';
    } else if(pattern === 'displace' && displaceMetadata && displaceMetadata.length > 0){
      meta = displaceMetadata; mode = 'displace';
    } else if(pattern === 'dispersion' && dispersionMetadata && dispersionMetadata.length > 0){
      meta = dispersionMetadata; mode = 'dispersion';
    } else if(pattern === 'shapes' && shapesMetadata && shapesMetadata.length > 0){
      meta = shapesMetadata; mode = 'shapes';
    } else if(pattern === 'gradient' && gradientMetadata && gradientMetadata.length > 0){
      meta = gradientMetadata; mode = 'gradient';
    } else if(pattern === 'weave' && weaveMetadata && weaveMetadata.length > 0){
      meta = weaveMetadata; mode = 'weave';
    } else {
      // Filter without per-element metadata (none) → pass through.
      destCtx.drawImage(sourceCanvas, 0, 0);
      return;
    }

    destCtx.clearRect(0, 0, w, h);
    destCtx.fillStyle = '#000';
    if(mode === 'ascii'){
      destCtx.font = asciiFontSize + 'px monospace';
      destCtx.textAlign = 'center';
      destCtx.textBaseline = 'middle';
    }

    const speed   = Math.max(0.2, animSpeed);
    const freqMul = Math.max(0.3, animFreq);
    const total   = meta.length;
    let drawnCount = 0; // safety: if loop produces no output, fall back to source

    // SHUFFLE LOGIC (canonical, see ARCHITECTURE.md):
    // - RECIPROCAL pairs: indices (0↔1), (2↔3), (4↔5), …
    //   These are neighbours in the metadata array, which for grid-based
    //   filters means neighbours in the grid → swap travels only one cell.
    // - Both members of a pair share the same animation phase so they swap
    //   synchronously. At t=0 each occupies its own slot; at t=1 they've
    //   swapped slots. The grid stays filled at both extremes.
    // - A perpendicular arc offset (sin Math.PI) makes the two members swing
    //   around each other instead of overlapping in the midpoint.
    // - Attributes (radius, char, shape, gray, h) lerp along the same migT,
    //   so the dot that arrived in slot B looks like the dot that used to
    //   be there (its size/char are now B's). Visually: a true swap dance.
    const minDim = Math.min(w, h);

    for(let i = 0; i < total; i++){
      const p = meta[i];
      // Reciprocal pair: even index pairs with the next, odd with previous
      const pairIdx = (i % 2 === 0) ? Math.min(i + 1, total - 1) : (i - 1);
      const partner = meta[pairIdx] || p;
      const isLeader = (i % 2) === 0; // arc direction key: one over, one under

      // Phase keyed by PAIR (not individual i) — both members share it.
      // SPEED controls migration rate. FREQ no longer doubles up with SPEED
      // (was redundant); it now drives a per-element breathing pulse below.
      const pairSeed = Math.floor(i / 2) * 0.137;
      // Decorrelate migration phase per pair so the grid ripples across the
      // image instead of every pair swapping in lockstep — was a global
      // sinewave previously, made the swap feel mechanical.
      const phaseOff = seededRandom(pairSeed + 300) * Math.PI * 2;
      const migPhase = tSec * 1.6 * speed + phaseOff + pairSeed * 5;
      // AMPLITUDE scales how far each pair actually swaps (0.15..1).
      const swapDepth = 0.15 + animAmp * 0.85;
      // Convert sin → 0..1 ramp then apply easeInOutQuart so members push
      // decisively through the midpoint (where they'd otherwise overlap)
      // and dwell at the endpoints — reads as a deliberate dance step, not
      // a hover.
      const raw = Math.sin(migPhase) * 0.5 + 0.5;
      const migT = easeInOutQuart(raw) * swapDepth;

      // Position swap: each member travels along the line between anchors
      const dx = partner.x - p.x;
      const dy = partner.y - p.y;
      const segLen = Math.sqrt(dx*dx + dy*dy);
      // Perpendicular unit vector for the arc (90° CCW)
      let perpX = 0, perpY = 0;
      if(segLen > 0.5){ perpX = -dy / segLen; perpY = dx / segLen; }
      // Arc magnitude: 0 at endpoints, peak at midpoint, scaled by AMPLITUDE
      const arcMag = Math.sin(migT / Math.max(0.01, swapDepth) * Math.PI) * segLen * 0.35 * (0.4 + animAmp * 0.6);
      const arcX = (isLeader ? +perpX : -perpX) * arcMag;
      const arcY = (isLeader ? +perpY : -perpY) * arcMag;

      const x = p.x + dx * migT + arcX;
      const y = p.y + dy * migT + arcY;

      // FREQUENCY now drives a per-element breathing pulse on its own clock —
      // each dot/glyph/shape pulses in size independently of the swap rhythm.
      const ownPhase = tSec * 2.0 * freqMul + i * 0.41;
      const ownPulse = 1 + Math.sin(ownPhase) * 0.18; // ~0.82..1.18

      if(mode === 'ascii'){
        // Glyph swap at half-cycle — character changes, position fixed
        const char = migT > 0.5 ? (partner.char || p.char) : p.char;
        destCtx.fillText(char, x, y);
        drawnCount++;
      } else if(mode === 'shapes'){
        const a0 = p.a !== undefined ? p.a : 1;
        const a1 = partner.a !== undefined ? partner.a : a0;
        const a = a0 + (a1 - a0) * migT;
        if(a < 0.02) continue;
        const r0 = p.r || 4, r1 = partner.r || r0;
        const rBlend = r0 + (r1 - r0) * migT;
        const r = rBlend * ownPulse;
        const rot0 = p.rot || 0, rot1 = partner.rot || rot0;
        const rot = rot0 + (rot1 - rot0) * migT + Math.sin(ownPhase) * 0.3 * animAmp;
        // Shape type swap at midpoint
        const shape = migT > 0.5 ? (partner.shape || p.shape) : p.shape;
        destCtx.globalAlpha = a;
        destCtx.save();
        destCtx.translate(x, y);
        destCtx.rotate(rot);
        destCtx.beginPath();
        const s = r * 2;
        if(shape === 'tri'){
          const hh = s * 0.866;
          destCtx.moveTo(0, -hh * 0.6667);
          destCtx.lineTo(-s/2, hh * 0.3333);
          destCtx.lineTo(s/2, hh * 0.3333);
          destCtx.closePath();
        } else if(shape === 'sq'){
          destCtx.rect(-s/2, -s/2, s, s);
        } else {
          destCtx.arc(0, 0, s/2, 0, Math.PI * 2);
        }
        destCtx.fill();
        destCtx.restore();
        drawnCount++;
      } else if(mode === 'gradient'){
        // Vertical strip — keep position & width, lerp height + gray + alpha
        const a0 = p.a !== undefined ? p.a : 1;
        const a1 = partner.a !== undefined ? partner.a : a0;
        const a = a0 + (a1 - a0) * migT;
        if(a < 0.02) continue;
        const h0 = p.h || 4, h1 = partner.h || h0;
        const hh = (h0 + (h1 - h0) * migT) * ownPulse;
        const g0 = p.gray !== undefined ? p.gray : 0;
        const g1 = partner.gray !== undefined ? partner.gray : g0;
        const g = Math.round(g0 + (g1 - g0) * migT);
        destCtx.fillStyle = 'rgba(' + g + ',' + g + ',' + g + ',' + a + ')';
        destCtx.fillRect(x - p.w * 0.5, y - hh * 0.5, p.w, hh);
        drawnCount++;
      } else if(mode === 'weave'){
        // Vertical thread segment — swap with paired neighbour, lerp thickness/length
        const a0 = p.a !== undefined ? p.a : 1;
        const a1 = partner.a !== undefined ? partner.a : a0;
        const a = a0 + (a1 - a0) * migT;
        if(a < 0.02) continue;
        const w0 = p.w || 2, w1 = partner.w || w0;
        const ww = w0 + (w1 - w0) * migT;
        const h0 = p.h || 4, h1 = partner.h || h0;
        const hh = h0 + (h1 - h0) * migT;
        destCtx.globalAlpha = a;
        destCtx.fillRect(x - ww * 0.5, y - hh * 0.5, ww, hh);
        drawnCount++;
      } else {
        // dots / displace / dispersion — lerp radius and alpha toward partner,
        // then multiply by ownPulse so each dot is also breathing on its own
        // schedule. This guarantees visible motion even if partner radius is
        // very close to original.
        const r0 = p.r || p.size || 2;
        const r1 = partner.r || partner.size || r0;
        const rBlend = r0 + (r1 - r0) * migT;
        const r = rBlend * ownPulse;
        const a0 = (p.a !== undefined) ? p.a : (p.alpha !== undefined ? p.alpha : 1);
        const a1 = (partner.a !== undefined) ? partner.a : (partner.alpha !== undefined ? partner.alpha : a0);
        const a = a0 + (a1 - a0) * migT;
        if(a < 0.02) continue;
        destCtx.globalAlpha = a;
        destCtx.beginPath();
        destCtx.arc(x, y, Math.max(0.3, r), 0, Math.PI * 2);
        destCtx.fill();
        drawnCount++;
      }
    }
    destCtx.globalAlpha = 1;
    destCtx.fillStyle = '#000';
    // Safety: if nothing actually rendered (all elements transparent or filter
    // skipped them) fall back to the source canvas so the user doesn't see a
    // blank stage on filter switch. This avoids the "switched to Abstract +
    // Shuffle and my creative disappeared" bug.
    if(drawnCount === 0){
      destCtx.drawImage(sourceCanvas, 0, 0);
    }
  }

  function applyASCIIAnimation(destCtx, sourceCanvas, w, h, t, tSec){
    // Pixel-level effects ignore glyph metadata — delegate to applyModernEffect
    if(animMode === 'pixelate' || animMode === 'pixelhd' || animMode === 'aiscan' || animMode === 'reveal'){
      return applyModernEffect(destCtx, sourceCanvas, w, h, t, tSec, animMode);
    }

    const meta = asciiMetadata;
    if(!meta || meta.length === 0){
      destCtx.drawImage(sourceCanvas, 0, 0);
      return;
    }

    destCtx.clearRect(0, 0, w, h);
    destCtx.font = asciiFontSize + 'px monospace';
    destCtx.textAlign = 'center';
    destCtx.textBaseline = 'middle';

    // Shuffle character pool — used by shuffle/glitch
    const pool = ['.', "'", ':', ';', '!', '+', '=', '^', '*', '#', 'x', 'X', 'o', 'O', '%', '&', '@', '$', '8', 'W', 'M', 'B'];

    // Particle cycle for radial dissolve
    const cycleTime = 3.5 / Math.max(0.2, animSpeed);
    const phase = (tSec % cycleTime) / cycleTime;
    const tri = phase < 0.5 ? phase * 2 : (1 - phase) * 2;
    const cx = w * 0.5, cy = h * 0.5;

    // 'shuffle' is handled at the top of applyAnimationEffect via
    // applyShuffleAnimation — it's not Signs-specific anymore.

    // Chromatic mode draws RGB triplets via globalCompositeOperation
    if(animMode === 'chromatic'){
      const shift = Math.sin(t * 2.0) * animAmp * 14; // 2.5× base rate
      destCtx.globalCompositeOperation = 'screen';
      for(let i = 0; i < meta.length; i++){
        const p = meta[i];
        destCtx.fillStyle = 'rgba(255, 80, 80, 0.75)';
        destCtx.fillText(p.char, p.x - shift, p.y);
        destCtx.fillStyle = 'rgba(80, 255, 120, 0.75)';
        destCtx.fillText(p.char, p.x, p.y);
        destCtx.fillStyle = 'rgba(80, 140, 255, 0.75)';
        destCtx.fillText(p.char, p.x + shift, p.y);
      }
      destCtx.globalCompositeOperation = 'source-over';
      return;
    }

    destCtx.fillStyle = '#000';

    for(let i = 0; i < meta.length; i++){
      const p = meta[i];
      let ox = 0, oy = 0, alpha = 1, char = p.char;

      if(animMode === 'flow'){
        ox = Math.sin((p.x * 0.02 + p.y * 0.02) + t * animFreq) * animAmp * 24;
        oy = Math.cos((p.x * 0.02 - p.y * 0.02) + t * animFreq) * animAmp * 16;
      } else if(animMode === 'liquid'){
        const s = 0.006 * animFreq;
        const nx = Math.sin(p.x*s + p.y*s*0.7 + t) * Math.cos(p.y*s*1.3 - t*0.5);
        const ny = Math.sin(p.y*s - p.x*s*0.5 + t*0.7) * Math.cos(p.x*s*0.9 + t*0.3);
        ox = nx * animAmp * 38;
        oy = ny * animAmp * 38;
      } else if(animMode === 'smoke'){
        // 3D simplex with time as Z → seamless organic drift, no sin pattern
        const t1 = tSec * 0.5 * Math.max(0.2, animSpeed);
        const f = animFreq * 0.008;
        const n3 = _simplex.noise3D;
        ox = (n3(p.x*f,       p.y*f,       t1) + 0.5*n3(p.x*f*2.5,       p.y*f*2.5,       t1*1.5)) * animAmp * 55;
        oy = (n3(p.x*f + 99,  p.y*f + 99,  t1) + 0.5*n3(p.x*f*2.5 + 99,  p.y*f*2.5 + 99,  t1*1.5)) * animAmp * 55;
      } else if(animMode === 'glitch'){
        const burstSeed = Math.floor(t * 6) + i * 0.31; // speed-scaled
        if(seededRandom(burstSeed) > 0.82){
          ox = (seededRandom(burstSeed * 1.7) - 0.5) * animAmp * 90;
          alpha = 0.4 + seededRandom(burstSeed * 2.3) * 0.6;
          if(seededRandom(burstSeed * 3.1) > 0.5){
            char = pool[Math.floor(seededRandom(burstSeed * 4.7) * pool.length)];
          }
        }
      } else if(animMode === 'particle'){
        const r1 = seededRandom(i * 0.13);
        const r2 = seededRandom(i * 0.37 + 100);
        const ang = Math.atan2(p.y - cy, p.x - cx) + (r1 - 0.5) * 1.2;
        const dist = (0.4 + r2) * tri * animAmp * 220;
        ox = Math.cos(ang) * dist;
        oy = Math.sin(ang) * dist;
        alpha = 1 - tri * 0.85;
      }

      if(alpha <= 0) continue;
      if(alpha !== 1) destCtx.globalAlpha = alpha;
      destCtx.fillText(char, p.x + ox, p.y + oy);
      if(alpha !== 1) destCtx.globalAlpha = 1;
    }
  }


  // Shuffle animation integrator (time-accumulated for stable SPEED control)
  let shufflePhase = 0; // accumulated seconds scaled by SPEED
  let shufflePrevTSec = 0; // last tSec seen
  // Separate integrator for Displace animation to avoid interference
  let shufflePhaseDisplace = 0;
  let shufflePrevTSecDisplace = 0;
  
  // Custom animation for Halftone (dots) inspired by Pixeldance/Inscript
  function applyDotsAnimation(destCtx, sourceCanvas, w, h, t, tSec){
    // DEBUG: Always log when this function is called
    if(!window._applyDotsCounter) window._applyDotsCounter = 0;
    window._applyDotsCounter++;
    if(window._applyDotsCounter % 60 === 0){
      console.log('🔵 applyDotsAnimation called! animMode =', animMode);
    }
    
    const imgData = animCtx.getImageData(0, 0, w, h);
    const data = imgData.data;
    destCtx.clearRect(0,0,w,h);
    
    if(animMode === 'flow'){
      // Flow: Organic breathing with multi-layered sine waves (Pixeldance style)
      const tempData = new Uint8ClampedArray(data);
      for(let y=0; y<h; y++){
        for(let x=0; x<w; x++){
          // Multiple overlapping sine waves for organic feel
          const wave1 = Math.sin((x*0.015 + y*0.01) + t*animFreq) * animAmp * 15;
          const wave2 = Math.sin((x*0.01 - y*0.015) + t*animFreq*1.3 + 1.5) * animAmp * 10;
          const wave3 = Math.sin((x*0.02 + y*0.02) + t*animFreq*0.7 + 3) * animAmp * 8;
          const totalWave = wave1 + wave2 + wave3;
          
          const srcX = Math.round(x + totalWave);
          const srcY = Math.round(y + totalWave*0.3);
          
          if(srcX>=0 && srcX<w && srcY>=0 && srcY<h){
            const si = (srcY*w + srcX)*4;
            const di = (y*w + x)*4;
            tempData[di] = data[si];
            tempData[di+1] = data[si+1];
            tempData[di+2] = data[si+2];
            tempData[di+3] = data[si+3];
          }
        }
      }
      const newImg = new ImageData(tempData, w, h);
      destCtx.putImageData(newImg, 0, 0);
      
    } else if(animMode === 'wave'){
      // Wave: Datamosh/Glitch - vertical strips with random displacement
      const tempData = new Uint8ClampedArray(data);
      const stripWidth = Math.max(2, Math.floor(w * 0.02)); // 2% of width per strip
      
      for(let x=0; x<w; x+=stripWidth){
        // Random glitch intensity per strip
        const seed = Math.floor(x/stripWidth + t*animFreq*10);
        const glitchAmt = (Math.sin(seed*1.234)*0.5 + 0.5) * animAmp;
        const shift = Math.floor((Math.sin(seed*2.345 + t*animFreq*2)*0.5 + 0.5) * 60 * glitchAmt - 30*glitchAmt);
        
        for(let y=0; y<h; y++){
          for(let dx=0; dx<stripWidth && x+dx<w; dx++){
            const srcY = y + shift;
            if(srcY>=0 && srcY<h){
              const si = (srcY*w + (x+dx))*4;
              const di = (y*w + (x+dx))*4;
              tempData[di] = data[si];
              tempData[di+1] = data[si+1];
              tempData[di+2] = data[si+2];
              tempData[di+3] = data[si+3];
            }
          }
        }
      }
      const newImg = new ImageData(tempData, w, h);
      destCtx.putImageData(newImg, 0, 0);
    } else if(animMode === 'shuffle'){
      // Shuffle: Snake-pattern circulation (ДРОН algorithm)
      // Uses pre-computed dots metadata from renderDots
      
      if(dotsMetadata.length < 2){
        // Fallback: no dots metadata available
        destCtx.putImageData(imgData, 0, 0);
        return;
      }
      
      // Build snake route from dots metadata
      // 1. Sort by position: left-to-right, top-to-bottom
      const sorted = dotsMetadata.slice().sort((a,b)=> a.y===b.y ? a.x-b.x : a.y-b.y);
      
      // 2. Group into rows
      const rows = [];
      let currentRow = [];
      let lastY = sorted[0].y;
      const rowThreshold = 10; // pixels tolerance for same row
      
      sorted.forEach(d=>{
        if(Math.abs(d.y - lastY) > rowThreshold){
          if(currentRow.length) rows.push(currentRow);
          currentRow = [d];
          lastY = d.y;
        } else {
          currentRow.push(d);
        }
      });
      if(currentRow.length) rows.push(currentRow);
      
      // 3. Create snake pattern: alternate row directions
      const snake = [];
      rows.forEach((row, i)=>{
        snake.push(...(i%2===0 ? row : row.reverse()));
      });
      
      // 4. Build anchor positions and routing
      const anchors = snake.map(d => ({x: d.x, y: d.y}));
      const routePos = new Array(snake.length);
      snake.forEach((d, i)=> routePos[i] = i);
      
      // 5. Calculate rotation using an explicit integrator so SPEED always works
      const baseSpeed = 0.025; // ~6× faster — visibly cycles at SPEED=1
      if (shufflePrevTSec === 0) shufflePrevTSec = tSec;
      const dtSec = Math.max(0, tSec - shufflePrevTSec);
      shufflePrevTSec = tSec;
      // accumulate phase (seconds) scaled by SPEED
      shufflePhase += dtSec * Math.max(0.2, animSpeed) * baseSpeed; // cycles
      const continuousRotation = (shufflePhase * anchors.length) % anchors.length;
      
      // Split into integer and fractional parts
      const rotationInt = Math.floor(continuousRotation);
      const rotationFrac = continuousRotation - rotationInt;
      
      // Smooth easing for the fractional part (makes transitions buttery smooth)
      const ease = x => x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2; // ease-in-out-quad (gentler than cubic)
      const smoothT = ease(rotationFrac);
      
      // 7. Calculate curve amount - AMPLITUDE controls the bulge/curve of trajectories
      // Increased range for more visible effect (0→0px, 1→60px)
      const curveAmount = animAmp * 60; // shape only; must not change speed
      
      // NEW: Dispersion effect based on frequency
      // Higher frequency = more scatter/dispersion (распыление)
      const dispersionAmount = (animFreq - 0.5) * 40; // 0.5→0px, 3.0→100px max scatter
      const dispersionActive = animFreq > 0.8; // Only activate dispersion when freq > 0.8
      
      // 8. Draw each dot in its animated position
      destCtx.fillStyle = '#000';
      
      snake.forEach((dot, originalIdx)=>{
        // Find current and next target positions (continuous interpolation)
        const currentPos = (originalIdx + rotationInt) % anchors.length;
        const nextPos = (originalIdx + rotationInt + 1) % anchors.length;
        
        const fromX = anchors[currentPos].x;
        const fromY = anchors[currentPos].y;
        const toX = anchors[nextPos].x;
        const toY = anchors[nextPos].y;
        
        // Linear interpolation with smooth easing
        const cx = fromX + (toX - fromX) * smoothT;
        const cy = fromY + (toY - fromY) * smoothT;
        
        // Add perpendicular bulge (sine wave curve)
        const dx = toX - fromX;
        const dy = toY - fromY;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len; // perpendicular normal
        const ny = dx / len;
        const bulge = Math.sin(smoothT * Math.PI) * curveAmount;
        
        let finalX = cx + nx * bulge;
        let finalY = cy + ny * bulge;
        
        // Apply dispersion effect (scatter) based on frequency
        if(dispersionActive && dispersionAmount > 0){
          // Use dot index as seed for consistent random scatter per dot
          const seed1 = originalIdx * 12.9898 + t * 0.5; // use speed-adjusted time
          const seed2 = originalIdx * 78.233 + t * 0.5;
          const pseudoRandX = Math.sin(seed1) * 43758.5453;
          const pseudoRandY = Math.sin(seed2) * 43758.5453;
          const randX = (pseudoRandX - Math.floor(pseudoRandX)) * 2 - 1; // -1 to 1
          const randY = (pseudoRandY - Math.floor(pseudoRandY)) * 2 - 1; // -1 to 1
          
          // Oscillating dispersion (breathing effect)
          const dispersionPhase = Math.sin(t * animFreq * 2 + originalIdx * 0.1) * 0.5 + 0.5; // 0 to 1, tied to SPEED
          const currentDispersion = dispersionAmount * dispersionPhase;
          
          finalX += randX * currentDispersion;
          finalY += randY * currentDispersion;
        }
        
        // Draw dot with ORIGINAL radius (no size change!)
        destCtx.beginPath();
        destCtx.arc(finalX, finalY, dot.r, 0, Math.PI * 2);
        destCtx.fill();
      });
    }
  }

  // Shuffle-style particle animation for Displace (3D)
  function applyDisplaceAnimation(destCtx, sourceCanvas, w, h, t, tSec){
    // Fallback if no metadata
    if(displaceMetadata.length < 2){
      destCtx.drawImage(sourceCanvas, 0, 0);
      return;
    }

    // Build snake route by rows (top-to-bottom, alternating left-right)
    const sorted = displaceMetadata.slice().sort((a,b)=> a.y===b.y ? a.x-b.x : a.y-b.y);
    const rows = [];
    let currentRow = [];
    let lastY = sorted[0].y;
    const rowThreshold = 12; // pixels tolerance between rows
    sorted.forEach(p=>{
      if(Math.abs(p.y - lastY) > rowThreshold){
        if(currentRow.length) rows.push(currentRow);
        currentRow = [p];
        lastY = p.y;
      } else {
        currentRow.push(p);
      }
    });
    if(currentRow.length) rows.push(currentRow);
    const snake = [];
    rows.forEach((row, i)=>{ snake.push(...(i%2===0 ? row : row.reverse())); });

    const anchors = snake.map(d => ({x:d.x, y:d.y}));
    if(anchors.length < 2){ destCtx.drawImage(sourceCanvas,0,0); return; }

    // Integrator: make SPEED work reliably (boosted base — was 0.004)
    const baseSpeed = 0.025;
    if (shufflePrevTSecDisplace === 0) shufflePrevTSecDisplace = tSec;
    const dtSec = Math.max(0, tSec - shufflePrevTSecDisplace);
    shufflePrevTSecDisplace = tSec;
    shufflePhaseDisplace += dtSec * Math.max(0.2, animSpeed) * baseSpeed; // cycles
    const continuousRotation = (shufflePhaseDisplace * anchors.length) % anchors.length;
    const rotationInt = Math.floor(continuousRotation);
    const rotationFrac = continuousRotation - rotationInt;
    const ease = x => x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2;
    const smoothT = ease(rotationFrac);

    const curveAmount = animAmp * 60;
    const dispersionAmount = (animFreq - 0.5) * 40;
    const dispersionActive = animFreq > 0.8;

    destCtx.clearRect(0,0,w,h);
    destCtx.fillStyle = '#000';

    snake.forEach((dot, originalIdx)=>{
      const currentPos = (originalIdx + rotationInt) % anchors.length;
      const nextPos = (originalIdx + rotationInt + 1) % anchors.length;
      const fromX = anchors[currentPos].x, fromY = anchors[currentPos].y;
      const toX = anchors[nextPos].x, toY = anchors[nextPos].y;
      const cx = fromX + (toX-fromX)*smoothT;
      const cy = fromY + (toY-fromY)*smoothT;
      const dx = toX-fromX, dy = toY-fromY;
      const len = Math.hypot(dx,dy)||1;
      const nx = -dy/len, ny = dx/len;
      const bulge = Math.sin(smoothT*Math.PI) * curveAmount;
      let finalX = cx + nx*bulge;
      let finalY = cy + ny*bulge;

      if(dispersionActive && dispersionAmount>0){
        const seed1 = originalIdx * 12.9898 + t * 0.5;
        const seed2 = originalIdx * 78.233 + t * 0.5;
        const prx = Math.sin(seed1) * 43758.5453;
        const pry = Math.sin(seed2) * 43758.5453;
        const randX = (prx - Math.floor(prx)) * 2 - 1;
        const randY = (pry - Math.floor(pry)) * 2 - 1;
        const dispersionPhase = Math.sin(t * animFreq * 2 + originalIdx * 0.1) * 0.5 + 0.5;
        const currentDispersion = dispersionAmount * dispersionPhase;
        finalX += randX * currentDispersion;
        finalY += randY * currentDispersion;
      }

      // Draw with original alpha
      const prevAlpha = destCtx.globalAlpha;
      destCtx.globalAlpha = Math.max(0, Math.min(1, dot.a ?? 1));
      destCtx.beginPath();
      destCtx.arc(finalX, finalY, dot.r, 0, Math.PI*2);
      destCtx.fill();
      destCtx.globalAlpha = prevAlpha;
    });
  }

  function getPhotoRect(){
    const sel = getSelectedPhoto();
    if(!sel) return null;
    const pw = photoLayer.width, ph = photoLayer.height;
    const { w: imgW, h: imgH } = getPhotoSize(sel);
    if(!imgW || !imgH) return null;
    const s = Math.min(pw/imgW, ph/imgH);
    const w = imgW * s * (sel.scale||1), h = imgH * s * (sel.scale||1);
    const x = (pw - w)/2 + (sel.offsetX||0), y = (ph - h)/2 + (sel.offsetY||0);
    return {x,y,w,h};
  }

  function renderDisplace(ctx, imgData, size, detail, w, h, invert){

    const detailFactor = (detail - 10)/(90-10);

    function hexToRgb(hex){
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return {r, g, b};
    }
    
    // Helper to interpolate between two colors
    function lerpColor(c1, c2, t){
      return {
        r: Math.floor(c1.r + (c2.r - c1.r) * t),
        g: Math.floor(c1.g + (c2.g - c1.g) * t),
        b: Math.floor(c1.b + (c2.b - c1.b) * t)
      };
    }
    
    const rgbTop = hexToRgb(colorTop);
    const rgbMid = hexToRgb(colorMid);
    const rgbBot = hexToRgb(colorBot);
    
    // Displacement strength based on detail
    const maxDisplacement = detail * 2.5; // 25-225 pixels
    
    // Perspective and rotation amount (higher STRENGTH = more rotation)
    const baseRotation = detailFactor;
    const skewAmount = baseRotation * 200; // Max 200px horizontal skew
    
    // Helper: sample grayscale safely
    function grayAt(px, py){
      const ix = Math.max(0, Math.min(w-1, px|0));
      const iy = Math.max(0, Math.min(h-1, py|0));
      const ii = (iy*w + ix)*4;
      return data[ii]*0.299 + data[ii+1]*0.587 + data[ii+2]*0.114;
    }
    // Light direction (fake 3D shading)
    const Lx = -0.4, Ly = -0.8, Lz = 0.4; // normalized approximately
    const Llen = Math.hypot(Lx,Ly,Lz)||1;
    const Lnx = Lx/Llen, Lny = Ly/Llen, Lnz = Lz/Llen;

    // Draw dots with displacement (3D effect with rotation + shading)
    for(let y=step/2; y<h; y+=step){
      for(let x=step/2; x<w; x+=step){
        // Sample brightness
        let sumBright=0, count=0;
        let isWhiteBg = true;
        for(let dy=-step/2; dy<step/2; dy++){
          for(let dx=-step/2; dx<step/2; dx++){
            const px = Math.floor(x+dx), py = Math.floor(y+dy);
            if(px<0||px>=w||py<0||py>=h) continue;
            const i = (py*w + px)*4;
            const r = data[i], g = data[i+1], b = data[i+2];
            // Check if this pixel is white background
            if(r < 250 || g < 250 || b < 250) isWhiteBg = false;
            const gray = r*0.299 + g*0.587 + b*0.114;
            sumBright += gray;
            count++;
          }
        }
        // Skip white background areas
        if(isWhiteBg) continue;
        
        const avgGray = count ? sumBright/count : 255;
        const brightness = invert ? avgGray : (255 - avgGray);
        const dark = brightness/255;
        
        // Skip very light areas
        if(dark < 0.15) continue;
        
        // Normalize coordinates
        const yNorm = y / h; // 0 to 1 (top to bottom)
        const xNorm = (x - w/2) / (w/2); // -1 to 1 (left to right from center)
        
        // 3D rotation around vertical axis (Y-axis)
        const rotationFactor = baseRotation;
        // Calculate how much the right side compresses (perspective)
        const perspectiveScale = 1 - rotationFactor * 0.6; // Right side shrinks when rotated
        
        // For each point, apply perspective based on its X position
        // Left side (xNorm = -1) stays at full width
        // Right side (xNorm = 1) shrinks based on rotation
        const xScale = xNorm > 0 
          ? 1 - (xNorm * rotationFactor * 0.6) // Right side shrinks
          : 1; // Left side stays full size
        
        // Calculate new X position with perspective
        const baseX = w/2 + (x - w/2) * xScale;
        
        // Add slight Y offset for top/bottom perspective
        const baseY = y;
        
        // Calculate displacement with rotation (points on right side displace less as they "rotate away")
        const sidenessFactor = 1 - Math.abs(xNorm) * rotationFactor * 0.5; // Right side displaces less
        const displaceX = dark * maxDisplacement * -0.8 * sidenessFactor;
        const displaceY = dark * maxDisplacement * -0.6 * sidenessFactor;
        
        const newX = baseX + displaceX;
        const newY = baseY + displaceY;
        
        // Estimate local normal from image gradient to fake volume
        let gx = grayAt(x+1, y) - grayAt(x-1, y);
        let gy = grayAt(x, y+1) - grayAt(x, y-1);
        // Normal toward viewer (Z positive)
        let nx = -gx/255, ny = -gy/255, nz = 1.0;
        const nlen = Math.hypot(nx,ny,nz)||1; nx/=nlen; ny/=nlen; nz/=nlen;
        let lambert = Math.max(0, nx*Lnx + ny*Lny + nz*Lnz);
        lambert = 0.35 + lambert*0.65; // keep some ambient
        
        // Vary dot size based on brightness, perspective AND rotation
        const depthFactor = 1 - yNorm * 0.3 - Math.abs(xNorm) * rotationFactor * 0.4; // Further = smaller
        const baseDotSize = dotSize * (0.4 + dark * 0.6);
        const r = baseDotSize * Math.max(0.3, depthFactor) * (0.9 + 0.3*lambert); // pseudo volume
        
        // Draw dot with black color, alpha affected by depth and light
        const alpha = (0.7 + dark * 0.3) * Math.max(0.4, depthFactor) * lambert;
        // subtle highlight halo
        if(r>2){
          ctx.fillStyle = `rgba(0,0,0,${alpha*0.3})`;
          ctx.beginPath();
          ctx.arc(newX, newY, r*1.2, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.fillStyle = `rgba(0,0,0,${alpha})`;
        ctx.beginPath();
        ctx.arc(newX, newY, r, 0, Math.PI*2);
        ctx.fill();

        // Save particle for animation
        displaceMetadata.push({ x:newX, y:newY, r, a:alpha });
      }
    }
  }
  
  function renderWeave(ctx, imgData, size, detail, w, h, invert){
    ctx.fillStyle = '#000';
    const data = imgData.data;
    const detailFactor = (detail-10)/(90-10);
    const blurAmount = Math.floor((1-detailFactor)*8);
    const step = Math.max(3, size * (0.4 + detailFactor*0.6));
    weaveMetadata = [];
    
    // Simple vertical blur
    const blurred = new Uint8ClampedArray(data);
    if(blurAmount > 1){
      for(let pass=0; pass<2; pass++){
        for(let x=0; x<w; x++){
          for(let y=0; y<h; y++){
            let sum=0, cnt=0;
            for(let dy=-blurAmount; dy<=blurAmount; dy++){
              const ny = y+dy;
              if(ny<0||ny>=h) continue;
              const i = (ny*w+x)*4;
              sum += data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
              cnt++;
            }
            const avg = cnt ? sum/cnt : 0;
            const bi = (y*w+x)*4;
            blurred[bi] = blurred[bi+1] = blurred[bi+2] = avg;
          }
        }
      }
    }
    
    // Noise field
    const noise = new Float32Array(w*h);
    for(let i=0; i<w*h; i++){
      noise[i] = seededRandom(i*1.234 + 567);
    }
    
    for(let x=step/2; x<w; x+=step){
      const col = Math.floor(x);
      for(let y=0; y<h; y++){
        const i = (y*w + col)*4;
        // Check if this is white background
        if(data[i] >= 250 && data[i+1] >= 250 && data[i+2] >= 250) continue;
        
        const gray = blurred[i];
        const brightness = invert ? gray : (255 - gray);
        const dark = 1 - brightness/255;
        const n = noise[y*w + col];
        const threshold = 0.3 + detailFactor*0.4 - dark*0.5;
        if(n < threshold){
          const len = step * (0.6 + (1-detailFactor)*1.5);
          const startY = Math.max(0, y - len/2);
          const endY = Math.min(h, y + len/2);
          const thickness = Math.max(1, step*0.7);
          const offsetX = (n-0.5)*step*0.3;
          ctx.fillRect(x + offsetX, startY, thickness, endY-startY);
          weaveMetadata.push({
            x: x + offsetX + thickness * 0.5,
            y: (startY + endY) * 0.5,
            w: thickness,
            h: endY - startY,
            a: 1
          });
        }
      }
    }
    // Re-sort by y-bucket then x so adjacent metadata indices are HORIZONTAL
    // neighbours (different columns at similar height). Default render order
    // is column-major, which would pair adjacent segments in the SAME column
    // and Shuffle motion would be barely visible.
    const rowSize = Math.max(8, Math.floor(Math.min(w, h) / 40));
    weaveMetadata.sort((a, b) => {
      const ra = Math.floor(a.y / rowSize), rb = Math.floor(b.y / rowSize);
      if(ra !== rb) return ra - rb;
      return a.x - b.x;
    });
  }

        }
        ctx.fill();
        ctx.restore();

  function renderASCII(ctx, imgData, size, detail, w, h, invert){

      for(let x=step; x<w; x+=step){

            const i=(py*w+px)*4;

          }
        }
        // Skip white background areas
        if(isWhiteBg) continue;
        
        const avgBright = count ? sumBright/count : 255;
        
        // Invert brightness if needed
        const brightness = invert ? avgBright : (255 - avgBright);
        const dark = 1 - brightness/255;
        
        // Skip very light areas (threshold depends on detail)

  function renderGradient(ctx, imgData, size, detail, w, h, invert){

      // Pre-calculate random variations for this column

      const colRand = seededRandom(seedCounter);
      const widthVar = colRand * stripWidth * 0.4;
      const actualWidth = stripWidth + widthVar;
      
      // Sample brightness along this column (optimized sampling)

            x: x + actualWidth * 0.5,
            y: y + stripHeight * 0.5,

  function renderDispersion(ctx, imgData, size, detail, w, h, invert){
    const data = imgData.data;
    const detailFactor = (detail - 10)/(90-10);
    
    // SPARSE particle grid - much larger steps for readability
    const baseStep = Math.max(4, size * 0.5); // Larger steps = fewer particles
    const step = Math.max(2, Math.floor(baseStep));
    
    // Dispersion strength based on detail slider
    const maxDispersion = 80 + detailFactor * 120; // How far particles scatter
    
    let seedCounter = 99999;
    
    // Array to store particles with their properties
    const particles = [];
    
    // Sample and create particles
    for(let y=0; y<h; y+=step){
      for(let x=0; x<w; x+=step){
        const i = (y*w + x)*4;
        if(i >= data.length) continue;
        
        // Check if this is white background
        if(data[i] >= 250 && data[i+1] >= 250 && data[i+2] >= 250) continue;
        
        const gray = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
        const brightness = invert ? (255 - gray) : gray;
        const dark = brightness/255;
        
        // Skip very light/transparent areas
        if(dark < 0.05) continue;
        
        seedCounter++;
        const rand1 = seededRandom(seedCounter);
        const rand2 = seededRandom(seedCounter + 10000);
        const rand3 = seededRandom(seedCounter + 20000);
        
        // Calculate dispersion from center
        const centerX = w / 2;
        const centerY = h / 2;
        const dx = x - centerX;
        const dy = y - centerY;
        const distFromCenter = Math.sqrt(dx*dx + dy*dy);
        const maxDist = Math.sqrt(centerX*centerX + centerY*centerY);
        const distRatio = distFromCenter / maxDist;
        
        // Particles further from center scatter more
        const scatterAmount = distRatio * maxDispersion * detailFactor;
        
        // Random scatter direction
        const angle = rand1 * Math.PI * 2;
        const scatterDist = rand2 * scatterAmount;
        
        // 3D depth effect - particles at edges appear to move forward/back
        const zOffset = (rand3 - 0.5) * maxDispersion * 0.3 * detailFactor;
        const depthScale = 1 + zOffset / 500; // Perspective scale
        
        // New position after dispersion
        const newX = x + Math.cos(angle) * scatterDist;
        const newY = y + Math.sin(angle) * scatterDist;
        
        // Calculate how far this particle scattered (0 = not scattered, 1 = max scatter)
        const scatterRatio = Math.min(1, scatterDist / (maxDispersion * detailFactor + 1));
        
        // Particle size varies with depth, brightness AND scatter distance
        // Moderate base size for readability
        const baseSize = step * 1.0; // Moderate size
        const sizeVariation = 0.6 + rand3 * 0.8; // 0.6 to 1.4
        
        // Smooth size reduction from center to edges
        const edgeSizeReduction = Math.max(0.1, 1 - Math.pow(scatterRatio, 1.2) * 0.9);
        
        const particleSize = Math.max(0.5, baseSize * sizeVariation * depthScale * (0.3 + dark * 0.7) * edgeSizeReduction);
        
        // Opacity varies with depth and distance - reduced for transparency
        const baseAlpha = 0.3 + dark * 0.4; // Lower opacity
        const depthAlpha = Math.max(0.1, Math.min(1, 1 - Math.abs(zOffset) / (maxDispersion * 0.5)));
        // Edge particles become more transparent
        const edgeAlphaReduction = Math.max(0.3, 1 - scatterRatio * 0.7);
        const alpha = baseAlpha * depthAlpha * edgeAlphaReduction;
        
        particles.push({
          x: newX,
          y: newY,
          z: zOffset,
          size: particleSize,
          alpha: alpha
        });
      }
    }
    
    // Sort particles by z-depth (back to front)
    particles.sort((a, b) => a.z - b.z);

    // Snapshot for animation overlays
    dispersionMetadata = [];

    // Draw particles with subtle glow only for larger particles
    ctx.fillStyle = '#000';
    for(let p of particles){
      if(p.alpha < 0.05) continue;

      // Only add glow to larger particles (center area)
      if(p.size > 3){
        ctx.globalAlpha = p.alpha * 0.2; // Subtle outer glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Core particle (sharp, no extra layers for small particles)
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();

      dispersionMetadata.push({ x: p.x, y: p.y, r: p.size, a: p.alpha });
    }

    // Re-sort by spatial position (row-major) so adjacent metadata indices
    // are physical neighbours — required by Shuffle's reciprocal-pair logic.
    const rowSize = Math.max(8, Math.floor(Math.min(w, h) / 40));
    dispersionMetadata.sort((a, b) => {
      const ra = Math.floor(a.y / rowSize), rb = Math.floor(b.y / rowSize);
      if(ra !== rb) return ra - rb;
      return a.x - b.x;
    });

    ctx.globalAlpha = 1.0;
  }

  // Duotone (gradient map): replace each photo pixel's colour with the
  // user's 3-stop gradient colour at that pixel's luminance. Produces the
  // Spotify-Wrapped / risograph tritone look from the existing palette.
  // SIZE has no effect (no cells); STRENGTH = contrast curve.
  function renderDuotone(ctx, imgData, size, detail, w, h, invert){
    const data = imgData.data;
    function hex(h){
      return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
    }
    const cTop = hex(($('#cTop')?.value || '#EA489E'));
    const cMid = hex(($('#cMid')?.value || '#E9F754'));
    const cBot = hex(($('#cBot')?.value || '#000000'));
    const midPos = parseFloat($('#midPos')?.value || '0.5');
    // STRENGTH 10..90 → contrast factor 0..1.5 (push darks down, lights up)
    const contrast = ((detail - 10) / 80) * 1.5;

    // Precompute 256-entry ramp so the inner loop is just lookup + write
    const ramp = new Uint8Array(768);
    for(let i = 0; i < 256; i++){
      let l = i / 255;
      if(invert) l = 1 - l;
      l = (l - 0.5) * (1 + contrast) + 0.5;
      l = l < 0 ? 0 : (l > 1 ? 1 : l);
      let r, g, b;
      if(l < midPos){
        const u = midPos > 0 ? l / midPos : 0;
        r = cBot.r + (cMid.r - cBot.r) * u;
        g = cBot.g + (cMid.g - cBot.g) * u;
        b = cBot.b + (cMid.b - cBot.b) * u;
      } else {
        const u = midPos < 1 ? (l - midPos) / (1 - midPos) : 1;
        r = cMid.r + (cTop.r - cMid.r) * u;
        g = cMid.g + (cTop.g - cMid.g) * u;
        b = cMid.b + (cTop.b - cMid.b) * u;
      }
      ramp[i*3] = r|0; ramp[i*3+1] = g|0; ramp[i*3+2] = b|0;
    }

    const out = ctx.createImageData(w, h);
    const od = out.data;
    for(let i = 0; i < data.length; i += 4){
      const r0 = data[i], g0 = data[i+1], b0 = data[i+2];
      // Skip the white letterbox / fill from offscreen — keep transparent so
      // the gradient layer underneath shows through.
      if(r0 >= 250 && g0 >= 250 && b0 >= 250){
        od[i+3] = 0;
        continue;
      }
      const luma = (r0*0.299 + g0*0.587 + b0*0.114) | 0;
      const k = luma * 3;
      od[i]   = ramp[k];
      od[i+1] = ramp[k+1];
      od[i+2] = ramp[k+2];
      od[i+3] = 255;
    }
    ctx.putImageData(out, 0, 0);
  }

  // Edge detection (Sobel): black ink lines where the photo's luminance has
  // a sharp gradient. Output is black-on-transparent so the gradient layer
  // shows through. STRENGTH controls threshold (lower = more lines, higher =
  // cleaner / fewer); SIZE is unused (Sobel produces 1-px-wide edges).
  function renderEdge(ctx, imgData, size, detail, w, h, invert){
    const data = imgData.data;
    // Precompute luma into a tight 1-byte/pixel buffer so the Sobel inner
    // loop is 8 random-access reads from this array, not 8 strided reads
    // from RGBA data (which is 4× larger and trashes the cache).
    const luma = new Uint8ClampedArray(w * h);
    for(let i = 0, j = 0; i < data.length; i += 4, j++){
      // Background pixels (offscreen white fill) → max luma so they don't
      // accidentally produce edges with adjacent real content.
      const r = data[i], g = data[i+1], b = data[i+2];
      if(r >= 250 && g >= 250 && b >= 250){ luma[j] = 255; continue; }
      luma[j] = (r*0.299 + g*0.587 + b*0.114) | 0;
    }
    // STRENGTH 10..90 → threshold 130..30 (more strength = higher threshold = cleaner)
    const detailFactor = (detail - 10) / 80;
    const threshold = 130 - detailFactor * 100;

    const out = ctx.createImageData(w, h);
    const od = out.data;
    for(let y = 1; y < h - 1; y++){
      for(let x = 1; x < w - 1; x++){
        const i = y * w + x;
        const tl = luma[i - w - 1], tc = luma[i - w], tr = luma[i - w + 1];
        const ml = luma[i - 1],                       mr = luma[i + 1];
        const bl = luma[i + w - 1], bc = luma[i + w], br = luma[i + w + 1];
        const gx = -tl - 2*ml - bl + tr + 2*mr + br;
        const gy = -tl - 2*tc - tr + bl + 2*bc + br;
        const mag = Math.sqrt(gx*gx + gy*gy);
        if(mag > threshold){
          const di = i * 4;
          let alpha = (mag - threshold) * 3;
          if(alpha > 255) alpha = 255;
          od[di]     = invert ? 255 : 0;
          od[di + 1] = invert ? 255 : 0;
          od[di + 2] = invert ? 255 : 0;
          od[di + 3] = alpha;
        }
      }
    }
    ctx.putImageData(out, 0, 0);
  }

  // Echo (multiply): stamp N copies of the source bitmap onto ctx.
  // Two modes:
  //   - external (default): copies extend outward from the photo position
  //     with horizontal offset + perspective spiral. Best for isolated
  //     subjects (transparent BG, SVG, cut-outs).
  //   - internal (INVERT=true): copies stay INSIDE the original frame,
  //     each one progressively smaller and rotated, so the effect works on
  //     full-frame photos where extending copies would just duplicate the
  //     background. Nested fan / receding-into-frame look.
  // SIZE → number of copies (3..14)
  // STRENGTH → rotation per step (0 = subtle, high = dramatic spiral)
  function renderEcho(ctx, src, srcX, srcY, srcW, srcH, size, detail, invert, pw, ph){
    const count = Math.max(3, Math.min(14, Math.round((size - 3) / 97 * 11) + 3));
    const detailFactor = (detail - 10) / 80; // 0..1
    const cx = srcX + srcW * 0.5;
    const cy = srcY + srcH * 0.5;

    if(invert){
      // INTERNAL mode: nested copies fanning inside the frame. Each copy
      // scales down by 'scaleStep' per step and rotates by 'angStep' radians;
      // all stay within the original photo bounds. Works on full-frame
      // photos because nothing extends past the frame.
      const scaleStep = 0.85 - detailFactor * 0.15;          // 0.85..0.70
      const angStep   = (0.12 + detailFactor * 0.45);         // radians per step
      // Slight diagonal offset keeps copies visible (not perfectly stacked)
      const offStep   = srcW * 0.04 * (0.5 + detailFactor);
      for(let i = count - 1; i >= 0; i--){
        const t = count > 1 ? i / (count - 1) : 0;            // 0=front
        const scale = Math.pow(scaleStep, i);
        const ang   = angStep * i;
        const ox    = Math.cos(ang) * offStep * i;
        const oy    = Math.sin(ang) * offStep * i;
        const alpha = 1 - t * 0.5;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(cx + ox, cy + oy);
        ctx.rotate(ang * 0.3);
        ctx.scale(scale, scale);
        ctx.drawImage(src, -srcW * 0.5, -srcH * 0.5, srcW, srcH);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      return;
    }

    // EXTERNAL mode (default): horizontal echo with perspective receding
    const stepDist = srcW * 0.18 * (0.55 + detailFactor * 0.9);
    const stepRotY = detailFactor * 0.45;
    for(let i = count - 1; i >= 0; i--){
      const t = count > 1 ? i / (count - 1) : 0;
      const dx = i * stepDist;
      const alpha = 1 - t * 0.55;
      const scale = 1 - t * 0.22;
      const rotY = stepRotY * i;
      const xCompress = Math.max(0.08, Math.cos(rotY));
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(cx + dx, cy);
      ctx.scale(scale * xCompress, scale);
      ctx.drawImage(src, -srcW * 0.5, -srcH * 0.5, srcW, srcH);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // Edge stretch (liquid border): one-sided horizontal taffy-pull with
  // Simplex-noise modulation so the result is wavy ribbons / chrome tendrils
  // — not the flat uniform shear of the previous version. The reference look
  // (melted-chrome model) has different "islands" of stretch with curling
  // strands rather than a uniform smear; we get that via:
  //   1. per-row STRETCH AMPLITUDE variation (some rows pull more, some less)
  //   2. per-pixel VERTICAL wobble in the source sample (creates curl/wave)
  //   3. per-pixel HORIZONTAL noise on the stretch length (breaks up uniformity)
  // SIZE → max stretch distance as fraction of width
  // STRENGTH → safe-zone size (lower = stretch covers more of frame)
  // INVERT → stretch toward the left edge instead of right
  function renderEdgeStretch(ctx, w, h, size, detail, invert){
    const data = ctx.getImageData(0, 0, w, h).data;
    const buf = _pxBuffers(w, h);
    const out = buf.out;
    out.fill(0);
    const detailFactor = (detail - 10) / 80;
    // safeZone capped at 0 so left half never distorts.
    const safeZone = Math.max(0, 0.6 - detailFactor * 0.7);
    const maxStretchPx = (size / 100) * 2.0 * w;
    const dir = invert ? -1 : 1;
    const n2 = _simplex.noise2D;
    // Linear falloff (no squaring) so the strand reach near the safe zone
    // boundary is meaningful — squared falloff made the first ~30 % of the
    // stretch region barely move, leaving a useless transition.
    for(let y = 0; y < h; y++){
      // Per-row variation at 5× the previous freq → ~5× more independent
      // strands stacked vertically, matches reference density.
      const rowFlow = 0.55 + 0.45 * n2(y * 0.025, 200);
      for(let x = 0; x < w; x++){
        const di = (y * w + x) * 4;
        const xNorm = (x - w / 2) * 2 / w;
        const sideX = xNorm * dir;
        let falloff = 0;
        if(sideX > safeZone){
          falloff = (sideX - safeZone) / Math.max(0.001, 1 - safeZone);
        }
        const stretchPx = falloff * maxStretchPx * rowFlow;
        // Wobble at 3–5× higher frequency than before, lower amplitude.
        // Tight curls along each strand instead of huge slow bumps.
        const wobble = n2(x * 0.004, y * 0.03) * stretchPx * 0.32;
        const sx = Math.max(0, Math.min(w - 1, (x - dir * stretchPx) | 0));
        const sy = Math.max(0, Math.min(h - 1, (y + wobble) | 0));
        const si = (sy * w + sx) * 4;
        const sr = data[si], sg = data[si + 1], sb = data[si + 2], sa = data[si + 3];

        // Subject-aware: if we're STRETCHING (falloff > small threshold) and
        // we'd sample a background pixel (transparent, or near-white photo
        // letterbox) — output transparent so the gradient layer underneath
        // shows through the strand gaps. Only SUBJECT pixels (non-white,
        // non-transparent) flow into the strand region.
        // For pixels in the safe zone (falloff ≈ 0), pass through unchanged.
        if(falloff > 0.02){
          const isBg = sa < 30 || (sr > 240 && sg > 240 && sb > 240);
          if(isBg){
            // Sample was background — leave this pixel transparent
            out[di] = 0; out[di + 1] = 0; out[di + 2] = 0; out[di + 3] = 0;
            continue;
          }
        }
        out[di]     = sr;
        out[di + 1] = sg;
        out[di + 2] = sb;
        out[di + 3] = sa;
      }
    }
    ctx.putImageData(buf.img, 0, 0);
  }

  // Event handlers
  const imgInput = $('#imageInput');
  imgInput?.addEventListener('change', async (e)=>{
    const f = e.target.files?.[0];
    if(!f) return;
    saveState(); // light snapshot — photo entry will be added in this turn
    const bmp = await createImageBitmap(f);
    // push into photos (max 12)
    if(photos.length >= 12) disposePhoto(photos.shift());
    photos.push({image:bmp, scale:1, offsetX:0, offsetY:0, pattern:'none', size:20, detail:50, invert:false});
    selectedIndex = photos.length - 1;
    originalPhoto = bmp;
    // Default to no filter on load
    const sel = document.getElementById('patternSelect');
    if(sel) sel.value = 'none';

    $('#photomakerSection').classList.remove('hidden');

  // ===== Video upload + continuous render loop =====
  // Continuous loop keeps the canvas in sync with playing video frames even when
  // filter animation is off. When filtersAnimated is on, tickFilters already renders.
  let _videoLoopScheduled = false;
  function hasAnyVideo(){ return photos.some(p => p.isVideo); }
  function ensureVideoLoop(){
    if(_videoLoopScheduled || !hasAnyVideo()) return;
    _videoLoopScheduled = true;
    requestAnimationFrame(videoLoop);
  }
  function videoLoop(){
    _videoLoopScheduled = false;
    if(!hasAnyVideo()) return;
    // Yield the canvas to the dedicated record loop while full-size export runs.
    if(_recordingActive){
      _videoLoopScheduled = true;
      requestAnimationFrame(videoLoop);
      return;
    }
    // Sole driver while there's a video on the canvas — renderPhotomaker itself
    // applies the graphic filter and, if filtersAnimated is on, the animation effect.
    renderPhotomaker();
    _videoLoopScheduled = true;
    requestAnimationFrame(videoLoop);
  }
  function disposePhoto(p){
    if(!p) return;
    if(p.isVideo && p.video){
      try { p.video.pause(); } catch(_){}
      if(p.videoUrl) URL.revokeObjectURL(p.videoUrl);
    }
  }

  const videoInput = $('#videoInput');
  videoInput?.addEventListener('change', async (e)=>{
    const f = e.target.files?.[0];
    if(!f) return;
    saveState();
    const videoEl = document.createElement('video');
    videoEl.src = URL.createObjectURL(f);
    videoEl.muted = true;
    videoEl.loop = true;
    videoEl.playsInline = true;
    videoEl.autoplay = true;
    try {
      await new Promise((res, rej)=>{
        videoEl.addEventListener('loadeddata', res, {once:true});
        videoEl.addEventListener('error', () => rej(new Error('Video load error')), {once:true});
      });
    } catch(err){
      URL.revokeObjectURL(videoEl.src);
      alert('Не удалось загрузить видео. Поддерживаются mp4/webm/mov.');
      e.target.value = '';
      return;
    }
    try { await videoEl.play(); } catch(_){}
    if(photos.length >= 12) disposePhoto(photos.shift());
    photos.push({
      image: null,
      video: videoEl,
      videoUrl: videoEl.src,
      isVideo: true,
      scale: 1, offsetX: 0, offsetY: 0,
      pattern: 'none', size: 20, detail: 50, invert: false
    });
    selectedIndex = photos.length - 1;
    const sel = document.getElementById('patternSelect');
    if(sel) sel.value = 'none';
    photoScale = 1; photoOffsetX = 0; photoOffsetY = 0;
    syncUIFromSelected();
    renderPhotomaker();
    ensureVideoLoop();
    $('#photomakerSection').classList.remove('hidden');
    updateExportButton();
    updateEmptyHint();
    e.target.value = '';
  });

  $('#patternSelect')?.addEventListener('change', ()=>{
    const p = getSelectedPhoto();
    const value = $('#patternSelect').value;
    if(!p && !svgLoaded) return;
    saveState();
    showPhotoSelection = false; isDraggingPhoto = false; isResizingPhoto = false;
    const photoUi = document.getElementById('photoUi'); if(photoUi) photoUi.style.display = 'none';
    if(p) p.pattern = value;
    else svgPattern = value;
    syncAnimControlsForPattern();
    renderPhotomaker();
    ensureTickFilters();
  });
  // Sliders: 'input' fires continuously while dragging (live preview). For
  // Undo we want ONE history entry per drag, capturing the PRE-drag value.
  // Trick: snapshot on the first 'input' of a drag, before the new value is
  // copied into p.*. 'change' (mouse-up) resets the per-slider flag so the
  // next drag opens a fresh history entry.
  const _sliderDrag = {};
  function snapOnFirstInput(id){ if(!_sliderDrag[id]){ _sliderDrag[id] = true; saveState(); } }
  function endSliderDrag(id){ _sliderDrag[id] = false; }

  $('#patternSize')?.addEventListener('input', ()=>{
    const p = getSelectedPhoto();
    if(!p && !svgLoaded) return;

  $('#patternSize')?.addEventListener('change', ()=> endSliderDrag('patternSize'));
  $('#detailLevel')?.addEventListener('input', ()=>{
    const p = getSelectedPhoto();
    if(!p && !svgLoaded) return;
    snapOnFirstInput('detailLevel');

    if(p) p.detail = v; else svgDetail = v;

  $('#detailLevel')?.addEventListener('change', ()=> endSliderDrag('detailLevel'));
  $('#invertPattern')?.addEventListener('change', ()=>{
    const p = getSelectedPhoto();

    if(p) p.invert = v; else svgInvert = v;
    renderPhotomaker();
  });
  // Decide what the EXPORT button should do right now:
  //  - If there's a video in photos → "DOWNLOAD VIDEO" (full-length capture)
  //  - Else if filter animation is on → "RECORD VIDEO (5S)" (synthetic-time loop)
  //  - Else → hidden
  function updateExportButton(){
    // The DOWNLOAD button adapts its label based on what's on canvas
    // (video / animated photo / static photo). The 10S sibling appears
    // only in the photo+animation case so the user can pick loop length.
    // The legacy #exportVideo button is hidden — runVideoExport() is
    // reached via #download.
    const hasVideo = photos.some(p => p.isVideo);
    const hasContent = photos.length > 0 || svgLoaded;
    const dlBtn = document.getElementById('download');
    const dlLbl = document.getElementById('downloadLabel');
    const dl10  = document.getElementById('download10');
    if(dlLbl && dlBtn && dlBtn.dataset.busy !== '1'){
      if(hasVideo){

        dlLbl.textContent = 'DOWNLOAD PNG';

      if(d10Lbl){

        if(mLbl && mLbl.textContent.startsWith('●')) mLbl.textContent = '● RECORD LIVE (15S MAX)';

      btn.dataset.mode = '';

  }
  function updateEmptyHint(){
    const hint = document.getElementById('emptyHint');

  }
  updateEmptyHint();
  $('#animSpeed')?.addEventListener('input', (e)=>{ snapOnFirstInput('animSpeed'); animSpeed = parseFloat(e.target.value||'1')||1; });
  $('#animSpeed')?.addEventListener('change', ()=> endSliderDrag('animSpeed'));

  // Which sliders does each animation mode actually use?
  //  speed = does the cycle/wave go faster?
  //  amp   = does amplitude affect the result?
  //  freq  = does freq affect the result?
  const ANIM_SLIDER_MAP = {
    off:       { speed: false, amp: false, freq: false },
    flow:      { speed: true,  amp: true,  freq: true  },
    liquid:    { speed: true,  amp: true,  freq: true  },
    smoke:     { speed: true,  amp: true,  freq: true  },
    glitch:    { speed: true,  amp: true,  freq: true  },
    chromatic: { speed: true,  amp: true,  freq: false },
    pixelate:  { speed: true,  amp: true,  freq: false },
    particle:  { speed: true,  amp: true,  freq: true  },
    pixelhd:   { speed: true,  amp: false, freq: true  },
    aiscan:    { speed: true,  amp: true,  freq: true  },
    shuffle:   { speed: true,  amp: true,  freq: true  },
    reveal:    { speed: true,  amp: false, freq: false }
  };
  function updateAnimSlidersState(){
    const cfg = ANIM_SLIDER_MAP[animMode] || ANIM_SLIDER_MAP.off;
    const pairs = [
      ['animSpeed', cfg.speed],
      ['animAmp',   cfg.amp],
      ['animFreq',  cfg.freq]
    ];
    pairs.forEach(([id, on]) => {
      const el = document.getElementById(id);
      if(!el) return;
      el.disabled = !on;
      // Also dim the .lab and .range wrappers via the .disabled class
      const wrap = el.closest('label.range');
      if(wrap) wrap.classList.toggle('disabled', !on);
      const lab = wrap && wrap.previousElementSibling;
      if(lab && lab.classList && lab.classList.contains('lab')){
        lab.classList.toggle('disabled', !on);
      }
    });
  }

  $('#animMode')?.addEventListener('change', ()=>{
    saveState();
    animMode = $('#animMode').value;
    // Mode acts as the on/off switch — "off" disables animation, anything else enables it
    const shouldAnimate = animMode !== 'off';
    if(shouldAnimate !== filtersAnimated){
      filtersAnimated = shouldAnimate;
      if(filtersAnimated) animStart = performance.now();
      updateExportButton();
    }
    updateAnimSlidersState();
    if(filtersAnimated) ensureTickFilters();
